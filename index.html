    tsvi_gradm: ['gradiente tcbi','gradiente del tsvi','gradiente del tracto de salida'],
    // Válvula aórtica — "válvula órtica"
    vao_vmax: ['velocidad m[aá]xima de v[aá]lvula [oó]rtica','velocidad m[aá]xima a[oó]rtica','vmax a[oó]rtico','vmax de la v[aá]lvula','velocidad aortica','velocidad aortica maxima'],
    vao_gradm: ['gradiente medio de v[aá]lvula [oó]rtica','gradiente medio a[oó]rtico','gradiente medio de la v[aá]lvula','gradiente medio'],
    vao_area: ['[aá]rea valvular de v[aá]lvula [oó]rtica','[aá]rea valvular a[oó]rtica','[aá]rea a[oó]rtica','area de la valvula aortica'],
    // Válvula mitral
    vmi_gradm: ['gradiente medio mitral','gradiente de la v[aá]lvula mitral','gradiente mitral'],
    vmi_area: ['[aá]rea valvular mitral','[aá]rea mitral','area de la valvula mitral'],
    vmi_vc: ['vena contracta'],
    vmi_pisa: ['radio de pisa','pisa'],
    vmi_eroa: ['eroa','[aá]rea de orificio regurgitante'],
    vmi_vreg: ['volumen regurgitante'],
    // Función diastólica — "función electrónica" / "onda e, onda a, e prima central"
    d_e: ['onda e mitral','onda e','velocidad e','pico e','\be\b(?!\s*prima)'],
    d_a: ['onda a mitral','onda a','velocidad a','pico a'],
    d_eseptal: ['e prima central','e prima septal','e\s*prima sep','onda e prima septal','e tisular septal','e prima del septum'],
    d_elateral: ['e prima lateral','onda e prima lateral','e tisular lateral'],
    d_dt: ['tiempo desaceleraci[oó]n de t','tiempo de desaceleraci[oó]n','desaceleraci[oó]n de la onda e','\bdt\b'],
    d_ivrt: ['ivrt','triv','tiempo de relajaci[oó]n'],
    d_vtr: ['velocidad m[aá]xima t r','velocidad m[aá]xima tr','vmax tr','vmax tricusp[ií]dea','jet tricusp[ií]deo'],
    // Cavidades derechas — "b de diámetro basal", "onda s"
    vd_diam: ['b de di[aá]metro basal','di[aá]metro basal','di[aá]metro basal del ventr[ií]culo derecho','di[aá]metro del ventr[ií]culo derecho','vd di[aá]metro'],
    vd_tapse: ['tapse'],
    vd_fac: ['fac','fracci[oó]n de acortamiento'],
    vd_s: ['onda s','velocidad s','s prima','s tisular'],
    ad_area: ['aur[ií]cula derecha por [aá]rea','[aá]rea de aur[ií]cula derecha','aur[ií]cula derecha [aá]rea','ad [aá]rea'],
    // Circulación pulmonar — "BCP", "BCI"
    pul_psap: ['psap','presi[oó]n sist[oó]lica de arteria pulmonar','presi[oó]n pulmonar','bcp','presion pulmonar'],
    pul_vci: ['bci','vci','vena cava inferior'],
  };
  const UNITS = '(?:mil[ií]metros|mm\\b|por\\s*ciento|%|cent[ií]metros|cm2|cm²|cm\\b|mililitros|ml\\/m|ml\\b|mmhg|metros por segundo|m\\/s|milisegundos|ms\\b|gramos por metro|g\\/m|gramos|g\\b)';
  function buildAliasRegex(alias){
    /* cada "palabra" capturada es una secuencia de letras o un número (con punto decimal real);
       la coma NUNCA forma parte de una palabra, así que siempre actúa como separador entre frases.
       Sin límite de palabras: si no hay coma/unidad de por medio, igual encuentra el final de la
       frase porque extractLeadingNumber recorta después al número válido más largo. */
    return new RegExp(alias+"\\s*[:\\-]?\\s*(?:de\\s+|es\\s+|en\\s+|fue\\s+)?((?:(?:\\d+\\.\\d+|\\d+|[a-záéíóúñ]+)\\s*)+?)(?:\\s*"+UNITS+"|[.,]|$)", 'i');
  }
  /* Prueba el texto capturado de mayor a menor cantidad de palabras y devuelve el
     primer (más largo) prefijo que resulte un número válido. Esto evita que la
     captura "se coma" la frase siguiente cuando no hay coma de por medio. */
  function extractLeadingNumber(raw){
    const words = raw.trim().split(/\s+/).filter(w=>w.length>0);
    for(let len=words.length; len>=1; len--){
      const n = wordsToNumber(words.slice(0,len).join(' '));
      if(n!==null) return n;
    }
    return null;
  }
  const FIELD_PATTERNS = [];
  Object.keys(VOICE_ALIASES).forEach(field=>{
    VOICE_ALIASES[field].forEach(alias=> FIELD_PATTERNS.push({ field, regex: buildAliasRegex(alias) }));
  });
  /* Alias más largos primero: evita que una frase corta "robe" el match de otra más específica */
  FIELD_PATTERNS.sort((a,b)=> b.regex.source.length - a.regex.source.length);

  function parse(t){
    t=' '+t.toLowerCase().trim()+' ';
    const hits=[];
    const claimed = new Set();
    FIELD_PATTERNS.forEach(p=>{
      if(claimed.has(p.field)) return;
      const m=t.match(p.regex);
      if(m){
        const raw=m[1]; if(!raw) return;
        const n=extractLeadingNumber(raw);
        if(n!==null){ hits.push({field:p.field, value:n}); claimed.add(p.field); }
      }
    });
    /* Insuficiencias valvulares — con variantes de pronunciación */
    [
      {words:['mitral','mitr[ao]l'], field:'vmi_insuf'},
      {words:['a[oó]rtica','[oó]rtica','aortica'], field:'vao_insuf'},
      {words:['tricusp[ií]dea','tricuspidia','tricúspide'], field:'vtr_insuf'},
      {words:['pulmonar'], field:'vpu_insuf'},
    ].forEach(({words, field})=>{
      words.forEach(w=>{
        const m=t.match(new RegExp('insuficiencia\\s+'+w+'\\s+(leve|moderada(?:\\s*severa)?|severa)','i'));
        if(m){
          let v = normalizeAccents(m[1].trim().toLowerCase());
          if(v==='moderada severa'||v==='moderada-severa') v='Moderada-Severa';
          else v = v.charAt(0).toUpperCase()+v.slice(1);
          hits.push({field, value:v});
        }
      });
    });
    /* Morfología valvular */
    const morfAo = t.match(/(?:válvula\s+)?(?:[oó]rtica|a[oó]rtica)\s+(tric[uú]spide|bic[uú]spide|pr[oó]tesis)/i);
    if(morfAo) hits.push({field:'vao_morf', value: morfAo[1].charAt(0).toUpperCase()+morfAo[1].slice(1)});
    const morfMi = t.match(/(?:válvula\s+)?mitral\s+(prolapso|calcificaci[oó]n|reum[aá]tica|pr[oó]tesis|normal)/i);
    if(morfMi) hits.push({field:'vmi_morf', value: morfMi[1].charAt(0).toUpperCase()+morfMi[1].slice(1)});
    /* Ritmo cardíaco */
    if(/sinusal/i.test(t)) hits.push({field:'p_ritmo', value:'Sinusal'});
    else if(/fibrilaci[oó]n auricular/i.test(t)) hits.push({field:'p_ritmo', value:'Fibrilación auricular'});
    else if(/fl[uú]ter auricular/i.test(t)) hits.push({field:'p_ritmo', value:'Flutter auricular'});
    else if(/marcapasos/i.test(t) && /ritmo/i.test(t)) hits.push({field:'p_ritmo', value:'Ritmo de marcapasos'});
    /* Ventana acústica */
    if(/ventana.*buena|buena.*ventana/i.test(t)) hits.push({field:'p_ventana', value:'Buena'});
    else if(/ventana.*regular|regular.*ventana/i.test(t)) hits.push({field:'p_ventana', value:'Regular'});
    else if(/ventana.*limitada|limitada.*ventana/i.test(t)) hits.push({field:'p_ventana', value:'Limitada'});
    /* Método de FEVI — "Faye por Simpson mi plano" / "Faye por Texas ball" */
    if(/faye?\s+por\s+simpson|simpson\s+bi\s*plano|simpson biplano/i.test(t)) hits.push({field:'metodo_fevi', value:'Simpson biplano'});
    else if(/faye?\s+por\s+tex[ao]s?\s+ball|teichholz|texas ball/i.test(t)) hits.push({field:'metodo_fevi', value:'Teichholz'});
    const tNorm = normalizeAccents(t);
    HALLAZGOS_LIST.forEach(h=>{ if(tNorm.includes(normalizeAccents(h.toLowerCase()))) hits.push({field:'__hallazgo', value:h}); });
    return hits;
  }
  function toggle(onResult, onState){
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SR){
      alert('El reconocimiento de voz no está disponible en este navegador.\n\niPhone/iPad: funciona en Safari.\nPC/Android: funciona en Chrome.');
      return;
    }
    if(listening){ listening=false; recognition.stop(); return; }

    /* Safari en iOS no soporta continuous=true ni interimResults=true: los ignora y se
       detiene solo después de cada frase. La solución es reiniciar automáticamente en
       onend mientras el médico no haya pulsado "Detener" — así funciona igual de bien
       en iOS que en Chrome, solo que técnicamente son sesiones cortas encadenadas. */
    const isIOS = /iP(hone|ad|od)/i.test(navigator.userAgent) ||
                  (navigator.platform==='MacIntel' && navigator.maxTouchPoints>1);

    function startRecognition(){
      recognition = new SR();
      recognition.lang = 'es-AR';
      recognition.continuous = !isIOS;    // iOS ignora esto, pero lo explicitamos
      recognition.interimResults = !isIOS; // iOS no soporta resultados parciales
      recognition.maxAlternatives = 1;

      recognition.onstart = ()=>{ listening=true; onState(true); };

      recognition.onend = ()=>{
        /* en iOS, onend se dispara sola después de cada frase porque no hay continuous;
           si el médico no detuvo manualmente, reiniciamos para escuchar la siguiente */
        if(listening) startRecognition();
        else onState(false);
      };

      recognition.onerror = (e)=>{
        console.error('voice error:', e.error);
        if(e.error==='not-allowed'){
          listening=false;
          onState(false);
          alert('El micrófono no tiene permiso.\n\niPhone/iPad: Ajustes → Safari → Micrófono → Permitir.\nPC: hacé click en el candado de la barra de dirección y habilitá el micrófono.');
          return;
        }
        /* otros errores (network, no-speech): reintentar si sigue activo */
        if(listening && e.error !== 'aborted') setTimeout(startRecognition, 300);
      };

      recognition.onresult = (ev)=>{
        let transcript='';
        for(let i=ev.resultIndex;i<ev.results.length;i++) transcript+=ev.results[i][0].transcript+' ';
        if(transcript.trim()) onResult(transcript, parse(transcript));
      };

      try{ recognition.start(); }
      catch(e){ console.error('voice start error:', e); }
    }

    startRecognition();
  }
  /* Dictado directo en un campo específico: el médico toca el campo, habla el valor,
     y se completa sin necesidad de decir el nombre del campo. */
  let _fieldRec = null; // referencia global para poder detenerla desde el stop

  function dictateIntoField(inputEl, onDone){
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SR){ if(onDone) onDone(null); return; }
    // detener cualquier sesión anterior
    if(_fieldRec){ try{ _fieldRec.stop(); }catch(e){} _fieldRec=null; }

    const rec = new SR();
    _fieldRec = rec;
    rec.lang = 'es-AR';
    rec.continuous = false;
    rec.interimResults = true;   // resultados intermedios para actuar inmediatamente
    rec.maxAlternatives = 3;
    let done = false;
    let commitTimer = null;

    function finish(val){
      if(done) return;
      clearTimeout(commitTimer);
      done = true;
      inputEl.classList.remove('field-cont-active');
      try{ rec.stop(); }catch(e){}
      _fieldRec = null;
      if(val!==null){
        inputEl.value = val;
        inputEl.dispatchEvent(new Event('input',{bubbles:true}));
        inputEl.dispatchEvent(new Event('change',{bubbles:true}));
      }
      if(onDone) onDone(val);
    }

    rec.onresult = (ev)=>{
      const result = ev.results[ev.results.length-1];
      const isFinal = result.isFinal;
      for(let a=0; a<result.length; a++){
        const raw = result[a].transcript.trim();
        if(!raw) continue;
        const n = extractLeadingNumber(normalizeAccents(raw.toLowerCase()));
        if(n!==null){
          if(isFinal){
            // resultado final: confirmar inmediatamente
            finish(n);
          } else {
            // resultado intermedio: esperar 400ms por si vienen más dígitos
            // (evita que "ciento cincuenta" se confirme antes de escuchar "y ocho")
            clearTimeout(commitTimer);
            commitTimer = setTimeout(()=> finish(n), 400);
          }
          return;
        }
        if(isFinal){
          finish(raw);
          return;
        }
      }
    };

    rec.onerror = (e)=>{
      if(e.error==='aborted') return;
      finish(null);
    };
    rec.onend = ()=>{ if(!done) finish(null); };

    inputEl.classList.add('field-cont-active');
    try{ rec.start(); }catch(e){ finish(null); }
  }

  function stopFieldDictation(){
    if(_fieldRec){ try{ _fieldRec.stop(); }catch(e){} _fieldRec=null; }
  }

  return { toggle, parse, dictateIntoField, stopFieldDictation };
})();

/* ---------------- PdfService ---------------- */
const PdfService = (()=>{
  async function waitForImages(container){
    const imgs = container.querySelectorAll('img');
    await Promise.all(Array.from(imgs).map(img=>{
      if(img.complete && img.naturalWidth>0) return Promise.resolve();
      return new Promise(resolve=>{
        img.addEventListener('load', resolve, { once:true });
        img.addEventListener('error', resolve, { once:true });
        setTimeout(resolve, 3000); // nunca bloquear más de 3s por una imagen que no carga
      });
    }));
  }

  async function downloadFromElement(el, name){
    if(!window.html2canvas||!window.jspdf){ alert('No se pudo cargar el generador de PDF. Revisá tu conexión.'); return; }
    try{
    /* Aseguramos que se capture el alto real completo del informe, sin que el contenedor
       con scroll (donde vive la hoja) recorte el contenido al convertirlo a imagen. */
    const scrollParent = el.closest('.report-pane');
    const prevScrollTop = scrollParent ? scrollParent.scrollTop : 0;
    if(scrollParent) scrollParent.scrollTop = 0;
    /* Esperamos a que el logo y demás imágenes terminen de cargar: en redes móviles más
       lentas, html2canvas puede capturar antes de que la imagen esté lista y queda en blanco. */
    await waitForImages(el);
    await new Promise(r=>setTimeout(r, 50)); // dar tiempo a que el layout se asiente (Safari es más lento para esto)
    const fullWidth = el.scrollWidth;
    const fullHeight = el.scrollHeight;
    /* Safari (sobre todo en iPhone) tiene un límite de tamaño de canvas más bajo que
       Chrome; si el informe es muy largo, bajamos la escala para no superarlo. */
    const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
    const MAX_CANVAS_DIM = isSafari ? 14000 : 16000;
    let scale = 2;
    if(fullHeight*scale > MAX_CANVAS_DIM) scale = Math.max(1, Math.floor((MAX_CANVAS_DIM/fullHeight)*10)/10);
    const canvas = await html2canvas(el, {
      scale, backgroundColor:'#FFFFFF', useCORS:true,
      width: fullWidth, height: fullHeight,
      windowWidth: fullWidth, windowHeight: fullHeight
    });
    if(scrollParent) scrollParent.scrollTop = prevScrollTop;

    /* Puntos de corte seguros: límites de secciones, tablas completas, encabezado, firma, etc.
       Así el salto de página nunca cae en medio de un título o una tabla. */
    const boundarySelector = '.rp-header, .rp-patient, .rp-summary, .rp-section, table.rp-table, .rp-findings, .rp-text, .rp-images, .rp-footer';
    const boundaryEls = el.querySelectorAll(boundarySelector);
    let breakpoints = [0];
    boundaryEls.forEach(b=>{ breakpoints.push(Math.round(b.offsetTop*scale)); });

    /* Dentro de los bloques de texto (descripción/conclusiones) agregamos además un punto
       de corte justo debajo de cada renglón YA RENDERIZADO (posición real del navegador,
       no una estimación por line-height), para que el corte caiga siempre entre líneas
       exactas y nunca a la mitad de una, sin ningún margen de error de redondeo.
       Si por algún motivo el navegador no puede medirlo así (caso raro), se usa una
       estimación por altura de línea como respaldo, para que nunca falle el PDF entero. */
    el.querySelectorAll('.rp-text').forEach(t=>{
      try{
        const range = document.createRange();
        range.selectNodeContents(t);
        const rects = range.getClientRects();
        const tTop = t.getBoundingClientRect().top;
        if(rects && rects.length){
          for(let i=0;i<rects.length;i++){
            const lineBottomWithinT = rects[i].bottom - tTop;
            breakpoints.push(Math.round((t.offsetTop + lineBottomWithinT)*scale));
          }
          return;
        }
        throw new Error('sin rects');
      }catch(err){
        const lh = parseFloat(getComputedStyle(t).lineHeight) || 20;
        const top = t.offsetTop, height = t.offsetHeight;
        for(let y=lh; y<height; y+=lh) breakpoints.push(Math.round((top+y)*scale));
      }
    });

    breakpoints.push(canvas.height);
    breakpoints = Array.from(new Set(breakpoints)).sort((a,b)=>a-b);

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p','mm','a4');
    /* Márgenes reales en los 4 lados (como un documento formal, ~1.5 cm), en vez de
       pegar el contenido borde a borde de la hoja. */
    const marginMM = 15;
    const pageWmm = pdf.internal.pageSize.getWidth(), pageHmm = pdf.internal.pageSize.getHeight();
    const printableWmm = pageWmm - marginMM*2;
    const printableHmm = pageHmm - marginMM*2;
    const pxPerMM = canvas.width / printableWmm;
    const pageHeightPx = Math.floor(printableHmm * pxPerMM);

    let cursor = 0, firstPage = true;
    while(cursor < canvas.height - 1){
      const target = Math.min(cursor + pageHeightPx, canvas.height);
      let chosen = null;
      breakpoints.forEach(bp=>{ if(bp>cursor && bp<=target) chosen = bp; });
      if(chosen===null || chosen<=cursor) chosen = target; // sección más alta que una página: corte forzado, caso raro

      const sliceHeight = chosen - cursor;
      const sliceCanvas = document.createElement('canvas');
      sliceCanvas.width = canvas.width;
      sliceCanvas.height = sliceHeight;
      sliceCanvas.getContext('2d').drawImage(canvas, 0, cursor, canvas.width, sliceHeight, 0, 0, canvas.width, sliceHeight);
      const sliceData = sliceCanvas.toDataURL('image/png');

      if(!firstPage) pdf.addPage();
      const sliceHeightMM = sliceHeight / pxPerMM;
      pdf.addImage(sliceData,'PNG', marginMM, marginMM, printableWmm, sliceHeightMM);
      cursor = chosen;
      firstPage = false;
    }
    const fileName = (name||'informe').replace(/[^a-z0-9_\-]/gi,'_')+'.pdf';
    const isIOS = /iP(hone|ad|od)/.test(navigator.userAgent) || (navigator.platform==='MacIntel' && navigator.maxTouchPoints>1);
    if(isIOS){
      /* En iPhone/iPad, la descarga automática de Safari no es confiable: abrimos el PDF
         en una pestaña nueva, desde donde se puede guardar con el botón de compartir. */
      const blob = pdf.output('blob');
      const url = URL.createObjectURL(blob);
      window.open(url, '_blank');
    } else {
      pdf.save(fileName);
    }
    }catch(err){
      console.error('Error generando PDF:', err);
      alert('No se pudo generar el PDF en este navegador. Probá con "Imprimir" como alternativa, o intentá de nuevo.\n\n'+(err && err.message ? err.message : ''));
    }
  }
  return { downloadFromElement };
})();

/* =====================================================================
   UI / ROUTER
   ===================================================================== */
const App = (()=>{
  let patients=[];
  let currentPatientId=null;
  let currentStudy=null; // objeto editable en memoria
  let expressMode=false;
  let descOverride=null, conclOverride=null; // ediciones manuales
  let pendingImages=[]; // base64

  /* Indicador de conexión */
  function updateSyncStatus(){
    const el = document.getElementById('syncStatus');
    if(!el) return;
    const online = navigator.onLine;
    el.style.color = online ? '#3a7d5c' : '#B3432A';
    el.textContent = online ? '● En línea' : '○ Sin señal — guardando local';
  }
  window.addEventListener('online', ()=>{ updateSyncStatus(); LocalCache.syncQueue(); });
  window.addEventListener('offline', updateSyncStatus);

  /* Cuando el cache se refresca en segundo plano, actualiza la lista silenciosamente */
  window._onPatientsRefreshed = ()=>{
    const updated = LocalCache.loadPatients().sort((a,b)=>(a.nombre||'').localeCompare(b.nombre||''));
    if(JSON.stringify(updated)!==JSON.stringify(patients)){
      patients = updated;
      renderPatientList();
    }
  };

  /* ---------- carga inicial ---------- */
  async function init(){
    updateSyncStatus();
    /* Carga instantánea desde cache local — no espera red */
    patients = await PatientService.list();
    renderPatientList();
    renderWelcome();
    document.getElementById('patientSearch').oninput = renderPatientList;
    document.getElementById('btnNewPatient').onclick = createPatientFlow;
    /* Sincronizar cola pendiente si hay conexión */
    LocalCache.syncQueue();
  }

  /* Gesto "deslizar para borrar": funciona con touch (celular) y mouse (PC).
     Desliza hacia la izquierda para revelar el botón rojo "Borrar" detrás del ítem. */
  function attachSwipeToDelete(wrapEl){
    const contentEl = wrapEl.querySelector('.swipe-content');
    const OPEN = -84;
    let startX=0, startY=0, base=0, current=0, dragging=false, horizontal=null;

    function start(e){
      const pt = e.touches ? e.touches[0] : e;
      startX = pt.clientX; startY = pt.clientY; dragging = true; horizontal = null;
      base = wrapEl.dataset.open==='1' ? OPEN : 0;
      contentEl.style.transition = 'none';
    }
    function move(e){
      if(!dragging) return;
      const pt = e.touches ? e.touches[0] : e;
      const dx = pt.clientX - startX, dy = pt.clientY - startY;
      if(horizontal===null && (Math.abs(dx)>8 || Math.abs(dy)>8)) horizontal = Math.abs(dx) > Math.abs(dy);
      if(horizontal===false) return; // dejar que la lista scrollee vertical normalmente
      if(horizontal===true && e.cancelable) e.preventDefault();
      current = Math.min(0, Math.max(OPEN, base+dx));
      contentEl.style.transform = `translateX(${current}px)`;
    }
    function end(){
      if(!dragging) return;
      dragging = false;
      contentEl.style.transition = 'transform .18s ease';
      if(horizontal===true){
        const openNow = current < OPEN/2;
        contentEl.style.transform = `translateX(${openNow?OPEN:0}px)`;
        wrapEl.dataset.open = openNow ? '1' : '0';
      }
    }
    contentEl.addEventListener('touchstart', start, {passive:true});
    contentEl.addEventListener('touchmove', move, {passive:false});
    contentEl.addEventListener('touchend', end);
    contentEl.addEventListener('mousedown', start);
    contentEl.addEventListener('mousemove', move);
    contentEl.addEventListener('mouseup', end);
    contentEl.addEventListener('mouseleave', ()=>{ if(dragging) end(); });
    /* si ya está abierto (mostrando "Borrar") y tocan el contenido, el primer toque
       solo lo cierra, no navega — evita aperturas accidentales del paciente/estudio */
    contentEl.addEventListener('click', (e)=>{
      if(wrapEl.dataset.open==='1'){
        e.preventDefault(); e.stopPropagation();
        contentEl.style.transition = 'transform .18s ease';
        contentEl.style.transform = 'translateX(0)';
        wrapEl.dataset.open = '0';
      }
    }, true);
  }

  function renderPatientList(){
    const q = (document.getElementById('patientSearch').value||'').toLowerCase();
    const box = document.getElementById('patientList');
    const filtered = patients.filter(p=> !q || (p.nombre||'').toLowerCase().includes(q) || (p.documento||'').toLowerCase().includes(q));
    box.innerHTML = filtered.map(p=>`
      <div class="swipe-wrap" data-open="0">
        <div class="swipe-action" data-action="delete-patient" data-id="${p.id}">Borrar</div>
        <div class="swipe-content">
          <div class="patient-item${p.id===currentPatientId?' active':''}" data-id="${p.id}">
            <div class="nm">${p.nombre||'(sin nombre)'}</div>
            <div class="meta">${p.documento||''}${p.documento?' · ':''}${p.edad?p.edad+' años':''}</div>
          </div>
        </div>
      </div>`).join('') || '<div style="padding:16px;font-size:12.5px;color:var(--gray-2);">Sin pacientes aún.</div>';
    box.querySelectorAll('.swipe-wrap').forEach(attachSwipeToDelete);
    box.querySelectorAll('.patient-item').forEach(it=> it.onclick = ()=> openPatient(it.dataset.id));
    box.querySelectorAll('[data-action="delete-patient"]').forEach(btn=>{
      btn.onclick = async ()=>{
        const p = patients.find(x=>x.id===btn.dataset.id);
        if(!confirm('¿Borrar a '+(p?p.nombre:'este paciente')+'? Esto borra también todos sus estudios guardados. No se puede deshacer.')) return;
        try{
          await PatientService.remove(btn.dataset.id);
          if(currentPatientId===btn.dataset.id){ currentPatientId=null; renderWelcome(); }
          patients = await PatientService.list();
          renderPatientList();
        }catch(e){
          console.error(e);
          alert('No se pudo borrar el paciente.\n\n'+e.message);
        }
      };
    });
  }

  function showFloatBtn(visible){
    const btn = document.getElementById('voiceBtn');
    const feed = document.getElementById('voiceFeed');
    if(btn) btn.style.display = visible ? 'flex' : 'none';
    if(feed && !visible){ feed.innerHTML=''; feed.classList.remove('visible'); }
  }

  function renderWelcome(){
    showFloatBtn(false);
    document.getElementById('main').innerHTML = `
      <div class="empty-state">
        <h2>Seleccioná un paciente</h2>
        <p>O creá uno nuevo para iniciar un estudio.</p>
      </div>`;
  }

  /* ---------- crear paciente ---------- */
  async function createPatientFlow(){
    const nombre = prompt('Nombre y apellido del paciente:');
    if(!nombre) return;
    const documento = prompt('Documento (opcional):') || '';
    const edad = prompt('Edad (opcional):') || '';
    const sexo = normalizeSexoInput(prompt('Sexo (M/F, opcional):') || '');
    try{
      const p = await PatientService.create({ nombre, documento, edad, sexo });
      patients = await PatientService.list();
      renderPatientList();
      openPatient(p.id);
    }catch(e){
      console.error(e);
      alert('No se pudo guardar el paciente en la base de datos.\n\n'+e.message);
    }
  }

  async function editPatientFlow(patient){
    const nombre = prompt('Nombre y apellido:', patient.nombre||'');
    if(nombre===null) return;
    const documento = prompt('Documento:', patient.documento||'') || '';
    const edad = prompt('Edad:', patient.edad||'') || '';
    const sexo = normalizeSexoInput(prompt('Sexo (M/F):', patient.sexo==='Femenino'?'F':(patient.sexo==='Masculino'?'M':'')) || '');
    try{
      await PatientService.update(patient.id, { nombre, documento, edad, sexo });
      patients = await PatientService.list();
      renderPatientList();
      openPatient(patient.id);
    }catch(e){
      console.error(e);
      alert('No se pudieron guardar los cambios.\n\n'+e.message);
    }
  }

  function normalizeSexoInput(v){
    v = (v||'').trim().toLowerCase();
    if(v==='m' || v.startsWith('masc')) return 'Masculino';
    if(v==='f' || v.startsWith('fem')) return 'Femenino';
    return '';
  }

  /* ---------- pantalla detalle paciente ---------- */
  async function openPatient(id){
    showFloatBtn(false);
    currentPatientId = id;
    renderPatientList();
    let patient, studies;
    try{
      patient = await PatientService.get(id);
      studies = await StudyService.listByPatient(id);
    }catch(e){
      console.error(e);
      document.getElementById('main').innerHTML = `<div class="empty-state"><h2>No se pudo cargar el paciente</h2><p>${e.message}</p></div>`;
      return;
    }
    document.getElementById('main').innerHTML = `
      <div class="topbar">
        <div class="crumbs"><b>${patient.nombre}</b> ${patient.documento?(' · '+patient.documento):''}</div>
        <div class="actions">
          <button class="btn-sm" id="btnEditPatient">Editar datos</button>
          <button class="btn-sm primary" id="btnNewStudy">+ Nuevo estudio</button>
        </div>
      </div>
      <div class="content">
        <div class="patient-header">
          <div>
            <h2>${patient.nombre}</h2>
            <div class="sub">${patient.documento?('Doc. '+patient.documento+' · '):''}${patient.edad?patient.edad+' años · ':''}${patient.sexo||'Sexo no registrado'}</div>
          </div>
        </div>
        <div class="section-label">Historial de estudios</div>
        <div id="studyHistory"></div>
      </div>`;
    document.getElementById('btnNewStudy').onclick = ()=> openStudyEditor(id, null);
    document.getElementById('btnEditPatient').onclick = ()=> editPatientFlow(patient);
    const hist = document.getElementById('studyHistory');
    hist.innerHTML = studies.length ? studies.map(s=>`
      <div class="swipe-wrap" data-open="0">
        <div class="swipe-action" data-action="delete-study" data-id="${s.id}">Borrar</div>
        <div class="swipe-content">
          <div class="study-row" data-id="${s.id}">
            <div><div class="d">Ecocardiograma Doppler Color</div><div class="t">${s.fecha?formatDate(s.fecha):new Date(s.savedAt).toLocaleDateString('es-AR')}</div></div>
            <div style="font-size:12px;color:var(--gray-2);">FEVI ${s.vi_fevi||'—'}%</div>
          </div>
        </div>
      </div>`).join('') : '<p style="font-size:13px;color:var(--gray-2);">Aún no hay estudios registrados.</p>';
    hist.querySelectorAll('.swipe-wrap').forEach(attachSwipeToDelete);
    hist.querySelectorAll('.study-row').forEach(r=> r.onclick = ()=> openStudyEditor(id, r.dataset.id));
    hist.querySelectorAll('[data-action="delete-study"]').forEach(btn=>{
      btn.onclick = async ()=>{
        if(!confirm('¿Borrar este estudio? No se puede deshacer.')) return;
        try{
          await StudyService.remove(btn.dataset.id);
          openPatient(id);
        }catch(e){
          console.error(e);
          alert('No se pudo borrar el estudio.\n\n'+e.message);
        }
      };
    });
  }

  function formatDate(iso){ if(!iso) return ''; const [y,m,d]=iso.split('-'); return d+'/'+m+'/'+y; }

  /* ---------- editor de estudio ---------- */
  async function openStudyEditor(patientId, studyId){
    showFloatBtn(true);
    const patient = await PatientService.get(patientId);
    currentStudy = studyId ? await StudyService.get(studyId) : {
      patientIdRef: patientId, p_nombre: patient.nombre, p_sexo: patient.sexo||'', p_edad: patient.edad||'',

  function bindEditorEvents(patientId, studyId){
    document.getElementById('btnBack').onclick = ()=> openPatient(patientId);
    document.getElementById('btnSaveStudy').onclick = ()=> saveCurrentStudy(patientId, studyId);
    document.getElementById('btnPdf').onclick = ()=>{ const isIOS = /iP(hone|ad|od)/.test(navigator.userAgent) || (navigator.platform==='MacIntel' && navigator.maxTouchPoints>1); if(isIOS){ PdfService.downloadFromElement(document.getElementById('paper'), 'informe_'+(currentStudy.p_nombre||'ecocardiograma')); } else { window.print(); } };
    document.querySelectorAll('.fgroup-head').forEach(h=> h.onclick = ()=> h.parentElement.classList.toggle('open'));
    document.getElementById('btnModeFull').onclick = ()=> setExpress(false);
    document.getElementById('btnModeExpress').onclick = ()=> setExpress(true);
    document.getElementById('voiceBtn').onclick = handleVoiceToggle;
    document.getElementById('imgInput').onchange = handleImages;
    document.getElementById('instLogoInput').onchange = handleInstLogo;

    /* Debounce del render: espera 120ms antes de redibujar el informe,
       así no se ralentiza mientras el médico escribe rápido */
    let renderTimer = null;
    function debouncedRender(){ clearTimeout(renderTimer); renderTimer = setTimeout(renderReport, 120); }

    document.querySelectorAll('[data-field]').forEach(el=>{
      el.addEventListener('input', ()=>{ readFieldsIntoStudy(); handleAutoCalcTrigger(el.dataset.field); applyConditionalVisibility(); debouncedRender(); });
      el.addEventListener('change', ()=>{ readFieldsIntoStudy(); handleAutoCalcTrigger(el.dataset.field); applyConditionalVisibility(); debouncedRender(); });
      el.addEventListener('focus', ()=>{
        showRefHint(el);
        if(typeof contDictMode !== 'undefined' && contDictMode) startContDictOnField(el);
      });
      el.addEventListener('blur', ()=>{
        hideRefHint();
      });
    });
    const formPaneEl = document.querySelector('.form-pane');
    if(formPaneEl) formPaneEl.addEventListener('scroll', hideRefHint);

    /* ---- MODO DICTADO CONTINUO ----
       Se activa una vez y permanece activo hasta que el médico lo detenga.
       Cada vez que se enfoca un campo, el micrófono arranca solo y llena el campo. */
    let contDictMode = false;
    let contDictField = null;

    function setContDictText(txt, listening){
      const dot = document.getElementById('contDictDot');
      const text = document.getElementById('contDictText');
      if(dot) dot.className = listening ? 'listening' : '';
      if(text) text.textContent = txt;
    }

    function stopContDict(){
      contDictMode = false;
      VoiceEngine.stopFieldDictation();
      if(contDictField){ contDictField.classList.remove('field-cont-active'); contDictField=null; }
      const bar = document.getElementById('contDictBar');
      if(bar) bar.classList.remove('active');
      const btn = document.getElementById('voiceBtn');
      if(btn){ btn.classList.remove('on'); btn.textContent='🎙'; }
    }

    function startContDictOnField(inputEl){
      if(!contDictMode) return;
      contDictField = inputEl;
      const fieldName = FIELD_LABELS_BY_ID[inputEl.dataset.field] || 'Campo';
      setContDictText('🎙 '+fieldName+'...', true);
      VoiceEngine.dictateIntoField(inputEl, (val)=>{
        if(!contDictMode) return;
        if(val!==null){
          setContDictText('✓ '+fieldName+': '+val, false);
          readFieldsIntoStudy();
          handleAutoCalcTrigger(inputEl.dataset.field);
          applyConditionalVisibility();
          renderReport();
        } else {
          setContDictText('Tocá el siguiente campo', false);
        }
      });
    }

    const contStop = document.getElementById('contDictStop');
    if(contStop) contStop.addEventListener('click', stopContDict);

    const voiceFloatBtn = document.getElementById('voiceBtn');
    if(voiceFloatBtn){
      voiceFloatBtn.onclick = ()=>{
        if(contDictMode){ stopContDict(); return; }
        contDictMode = true;
        voiceFloatBtn.classList.add('on');
        voiceFloatBtn.textContent = '⏹';
        const bar = document.getElementById('contDictBar');
        if(bar) bar.classList.add('active');
        setContDictText('Tocá cualquier campo y hablá el valor', false);
      };
    }

    buildChips();
    buildTemplates();
    applyExpressVisibility();
    applyConditionalVisibility();
  }

  /* Campos calculados automáticamente y qué mediciones los originan */
  const AUTO_CALC_TRIGGERS = {
    vi_fevi:    ['vi_ddvi','vi_dsvi','vi_vtd','vi_vts','metodo_fevi'],
    vi_masai:   ['vi_ddvi','vi_siv','vi_pp','p_peso','p_talla'],
    vao_area:   ['tsvi_diam','tsvi_vmax','tsvi_vtitsvi','vao_vmax','vao_vtiao'],
    pul_psap:   ['d_vtr','pul_vci'],
    pul_sv:     ['tsvi_diam','tsvi_vtitsvi'],
    pul_co:     ['tsvi_diam','tsvi_vtitsvi','p_fc'],
    vmi_area:   ['d_pht','d_dt'],
    vmi_eroa:   ['vmi_pisa','vmi_vmaxr'],
    vmi_vreg:   ['vmi_pisa','vmi_vmaxr','vmi_eroa','vmi_itvr'],
    vmi_frreg:  ['vmi_pisa','vmi_vmaxr','vmi_eroa','vmi_itvr','vmi_vreg','vmi_icvao','tsvi_diam'],
    vao_eroa:   ['vao_pisa','vao_vmaxr'],
    vao_vreg:   ['vao_pisa','vao_vmaxr','vao_eroa','vao_itvr'],
    vao_frreg:  ['vao_pisa','vao_vmaxr','vao_eroa','vao_itvr','vao_vreg','vao_icvt','tsvi_diam'],
  };
  let autoCalcOverrides = {
    vi_fevi:false, vi_masai:false, vao_area:false,
    pul_psap:false, pul_sv:false, pul_co:false, vmi_area:false,
    vmi_eroa:false, vmi_vreg:false, vmi_frreg:false,
    vao_eroa:false, vao_vreg:false, vao_frreg:false
  };

  /* Muestra el rango normal de referencia justo debajo del campo mientras se está escribiendo
     (no se guarda en ningún lado; es solo una ayuda visual momentánea). */
  function showRefHint(el){
    /* En móvil, el scroll automático al enfocar un input puede desplazar la vista de
       forma inesperada. Lo prevenimos guardando la posición y restaurándola. */
    const isMobile = /iP(hone|ad|od)|Android/i.test(navigator.userAgent);
    if(isMobile){
      const formPane = document.querySelector('.form-pane');
      if(formPane){ const savedScroll = formPane.scrollTop; setTimeout(()=>{ formPane.scrollTop=savedScroll; },50); }
    }
    const field = el.dataset.field;
    const ref = ReferenceRanges.get(field, currentStudy.p_sexo);
    const hint = document.getElementById('refHint');
    if(!ref || !hint){ if(hint) hint.style.display='none'; return; }
    hint.textContent = 'Normal: '+ref.min+' – '+ref.max+(ref.unit?(' '+ref.unit):'');
    const formPane = document.querySelector('.form-pane');
    const fieldRect = el.getBoundingClientRect();
    const paneRect = formPane.getBoundingClientRect();
    hint.style.top = (fieldRect.bottom - paneRect.top + formPane.scrollTop + 6) + 'px';
    hint.style.left = (fieldRect.left - paneRect.left) + 'px';
    hint.style.display = 'block';
  }
  function hideRefHint(){
    const hint = document.getElementById('refHint');
    if(hint) hint.style.display = 'none';
  }

  function handleAutoCalcTrigger(field){
    if(field in autoCalcOverrides){
      /* el médico está editando el campo calculado directamente: respetar su valor */
      autoCalcOverrides[field] = true;
      return;
    }
    Object.keys(AUTO_CALC_TRIGGERS).forEach(computedField=>{
      if(AUTO_CALC_TRIGGERS[computedField].includes(field)) autoCalcOverrides[computedField] = false;
    });
    applyAutoCalcs();
  }

  /* Detecta si un valor guardado fue editado a mano (difiere de lo que daría la fórmula) */
  function detectOverride(savedValue, computeFn){
    if(savedValue===undefined || savedValue===null || savedValue==='') return false;
    const computed = computeFn();
    if(computed===null || computed===undefined) return true;
    return Math.abs(parseFloat(savedValue) - computed) > 0.05;
  }

  /* Recalcula FEVI, masa indexada y área valvular aórtica, sin pisar valores editados a mano */
  /* Muestra ambos resultados (Simpson y Teichholz) cuando hay datos para cada uno,
     para que el médico vea los dos antes de elegir cuál se reporta. */
  function updateFeviBothHint(){
    const hint = document.getElementById('feviBothHint');
    if(!hint) return;
    const simpson = ClinicalEngine.calcFEVISimpson(currentStudy);
    const teich = ClinicalEngine.calcFEVITeichholz(currentStudy);
    const parts = [];
    if(simpson) parts.push('Simpson biplano: '+simpson.value+'%');
    if(teich) parts.push('Teichholz: '+teich.value+'%');
    if(parts.length<2){ hint.style.display='none'; return; }
    hint.textContent = 'Ambos métodos calculados — '+parts.join(' · ')+'. Elegí cuál reportar arriba, en "Método de cálculo de FEVI".';
    hint.style.display = '';
  }

  function applyAutoCalcs(){
    const bsaVal = ClinicalEngine.bsa(parseFloat(currentStudy.p_peso), parseFloat(currentStudy.p_talla));
    updateFeviBothHint();
    if(!autoCalcOverrides.vi_fevi){
      const fevi = ClinicalEngine.calcFEVI(currentStudy);
      if(fevi){
        currentStudy.vi_fevi = String(fevi.value);
        const el = document.getElementById('f_vi_fevi'); if(el) el.value = fevi.value;
        const elM = document.getElementById('f_metodo_fevi'); if(elM && !elM.value) elM.value = fevi.method;
      }
    }
    if(!autoCalcOverrides.vi_masai){
      const massInfo = ClinicalEngine.calcMass(currentStudy, bsaVal);
      if(massInfo && massInfo.massIndexed!==null){
        currentStudy.vi_masai = String(massInfo.massIndexed);
        const el = document.getElementById('f_vi_masai'); if(el) el.value = massInfo.massIndexed;
      }
    }
    if(!autoCalcOverrides.vao_area){
      const ava = ClinicalEngine.calcAVA(currentStudy);
      if(ava!==null){
        currentStudy.vao_area = String(ava);
        const el = document.getElementById('f_vao_area'); if(el) el.value = ava;
      }
    }
    /* Auto-cálculo IM: EROA → Vreg → FR */
    function autoFill(field, calcFn){
      if(!autoCalcOverrides[field]){
        const val = calcFn();
        if(val!==null && val!==undefined){
          currentStudy[field] = String(val);
          const el = document.getElementById('f_'+field); if(el) el.value = val;
        }
      }
    }
    const rMI = ClinicalEngine.calcRegurg(currentStudy, 'vmi');
    autoFill('vmi_eroa', ()=> rMI.eroa);
    autoFill('vmi_vreg', ()=> rMI.vreg);
    autoFill('vmi_frreg',()=> rMI.fr);
    const rAO = ClinicalEngine.calcRegurg(currentStudy, 'vao');
    autoFill('vao_eroa', ()=> rAO.eroa);
    autoFill('vao_vreg', ()=> rAO.vreg);
    autoFill('vao_frreg',()=> rAO.fr);

    /* PSAP automática desde Vmax TR */
    autoFill('pul_psap', ()=> ClinicalEngine.calcPSAP(currentStudy));

    /* MVA por PHT/DT desde función diastólica (estenosis mitral) */
    const mva = ClinicalEngine.calcMVA({d_pht: currentStudy.d_pht, d_dt: currentStudy.d_dt});
    if(mva!==null){ autoFill('vmi_area', ()=> mva); }

    /* Volumen sistólico y gasto cardíaco */
    const svco = ClinicalEngine.calcSVCO(currentStudy);
    if(svco){ autoFill('pul_sv', ()=> svco.sv); autoFill('pul_co', ()=> svco.co); }
  }

  /* Muestra/oculta los campos de cuantificación de regurgitación mitral según la severidad seleccionada */
  function applyConditionalVisibility(){
    FIELD_GROUPS.forEach(g=>{
      if(!g.conditionalOn) return;
      const block = document.getElementById('cond_'+g.id);
      if(!block) return;
      const val = currentStudy[g.conditionalOn];
      let show;
      if(g.conditionalValue_in) show = g.conditionalValue_in.includes(val);
      else if(g.conditionalValue) show = val===g.conditionalValue;
      else show = val && val!=='';
      block.style.display = show ? '' : 'none';
    });
    applyRhythmVisibility();
  }

  /* En fibrilación auricular el flujo mitral es monofásico: no hay onda A real, así que
     se bloquea ese campo y se muestra un aviso, en lugar de dejar ingresar un valor inválido. */
  function applyRhythmVisibility(){
    const isAF = currentStudy.p_ritmo === 'Fibrilación auricular';
    const aField = document.getElementById('f_d_a');
    if(aField){
      const item = aField.closest('.fitem');
      aField.disabled = isAF;
      if(isAF){ aField.value=''; currentStudy.d_a=''; aField.placeholder='No aplica (FA)'; }
      else { aField.placeholder=''; }
      if(item) item.style.opacity = isAF ? '0.45' : '1';
    }
    let note = document.getElementById('afNote');
    if(note) note.style.display = isAF ? '' : 'none';
  }

  function setExpress(on){
    expressMode = on;
    document.getElementById('btnModeFull').classList.toggle('active', !on);
    document.getElementById('btnModeExpress').classList.toggle('active', on);
    applyExpressVisibility();
  }
  function applyExpressVisibility(){
    document.querySelectorAll('.fgroup[data-group]').forEach(g=>{
      const isExpress = g.dataset.express==='true';
      g.style.display = (expressMode && !isExpress) ? 'none' : '';
    });
  }

  function buildChips(){
    const box = document.getElementById('chipsBox');
    box.innerHTML = HALLAZGOS_LIST.map(h=>`<div class="chip${currentStudy.hallazgos.includes(h)?' on':''}" data-h="${h}">${h}</div>`).join('');
    box.querySelectorAll('.chip').forEach(c=>{
      c.onclick = ()=>{
        const h = c.dataset.h;
        const idx = currentStudy.hallazgos.indexOf(h);
        if(idx>=0) currentStudy.hallazgos.splice(idx,1); else currentStudy.hallazgos.push(h);
        c.classList.toggle('on');
        renderReport();
      };
    });
  }

  function buildTemplates(){
    const box = document.getElementById('templatesBox');
    box.innerHTML = Object.keys(TEMPLATES).map(n=>`<div class="chip" data-t="${n}">${n}</div>`).join('');
    box.querySelectorAll('.chip').forEach(c=>{
      c.onclick = ()=>{
        const t = TEMPLATES[c.dataset.t];
        Object.keys(t).forEach(k=>{ currentStudy[k]=t[k]; const el=document.getElementById('f_'+k); if(el) el.value=t[k]; });
        renderReport();
      };
    });
  }

  function populateFields(){
    ALL_FIELD_IDS.concat(['fecha','p_medsol','p_motivo','p_peso','p_talla','p_fc','p_ritmo','p_ventana']).forEach(id=>{
      const el = document.getElementById('f_'+id);
      if(el && currentStudy[id]!==undefined) el.value = currentStudy[id];
    });
    const hl = document.getElementById('f_hallazgosLibres');
    if(hl) hl.value = currentStudy.hallazgosLibres || '';
    hl && hl.addEventListener('input', ()=>{ currentStudy.hallazgosLibres = hl.value; renderReport(); });
    renderImagePreview();
    renderInstLogoPreview();

    /* Si el valor guardado no coincide con lo que daría la fórmula, asumimos que fue
       ajustado a mano y lo protegemos para no pisarlo al recalcular. */
    const bsaVal = ClinicalEngine.bsa(parseFloat(currentStudy.p_peso), parseFloat(currentStudy.p_talla));
    autoCalcOverrides.vi_fevi = detectOverride(currentStudy.vi_fevi, ()=>{
      const f = ClinicalEngine.calcFEVI(currentStudy); return f ? f.value : null;
    });
    autoCalcOverrides.vi_masai = detectOverride(currentStudy.vi_masai, ()=>{
      const m = ClinicalEngine.calcMass(currentStudy, bsaVal); return m ? m.massIndexed : null;
    });
    autoCalcOverrides.vao_area = detectOverride(currentStudy.vao_area, ()=> ClinicalEngine.calcAVA(currentStudy));

    applyAutoCalcs();
    applyConditionalVisibility();
  }

  function readFieldsIntoStudy(){
    document.querySelectorAll('[data-field]').forEach(el=>{
      currentStudy[el.dataset.field] = el.value;
    });
  }

  /* ---------- voz ---------- */
  function handleVoiceToggle(){
    VoiceEngine.toggle(
      (transcript, hits)=>{
        const filled = [];
        hits.forEach(h=>{
          if(h.field==='__hallazgo'){
            if(!currentStudy.hallazgos.includes(h.value)){ currentStudy.hallazgos.push(h.value); filled.push(h.value); }
          } else {
            currentStudy[h.field]=h.value;
            const el=document.getElementById('f_'+h.field);
            if(el){
              el.value=h.value;
              el.dispatchEvent(new Event('input',{bubbles:true}));
              el.dispatchEvent(new Event('change',{bubbles:true}));
            }
            handleAutoCalcTrigger(h.field);
            filled.push((FIELD_LABELS_BY_ID[h.field]||h.field)+' = '+h.value);
          }
        });
        const feed = document.getElementById('voiceFeed');
        if(feed){
          feed.innerHTML =
            '<div style="font-size:10px;opacity:.7;margin-bottom:2px;">"'+transcript.trim()+'"</div>'+
            (filled.length
              ? '<div style="font-weight:700;font-size:12px;">✓ '+filled.join('<br>')+'</div>'
              : '<div style="font-size:10px;opacity:.7;">No reconocí ningún campo.</div>');
          feed.classList.add('visible');
          clearTimeout(feed._hideTimer);
          feed._hideTimer = setTimeout(()=>{ feed.classList.remove('visible'); }, 3000);
        }
        buildChips();
        applyConditionalVisibility();
        renderReport();
      },
      (on)=>{
        const btn=document.getElementById('voiceBtn');
        const feed=document.getElementById('voiceFeed');
        if(btn){ btn.classList.toggle('on',on); btn.textContent=on?'⏹':'🎙'; btn.title=on?'Detener dictado':'Dictar mediciones'; }
        if(feed){
          if(on){ feed.innerHTML='<div style="font-size:11px;">Escuchando...</div>'; feed.classList.add('visible'); }
          else{ feed.innerHTML=''; feed.classList.remove('visible'); }
        }
      }
    );
  }

  /* ---------- imágenes ---------- */
  function handleInstLogo(e){
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ()=>{ currentStudy.institutionLogo = reader.result; renderInstLogoPreview(); renderReport(); };
    reader.readAsDataURL(file);
  }
  function renderInstLogoPreview(){
    const box = document.getElementById('instLogoPreview');
    if(!box) return;
    box.innerHTML = currentStudy.institutionLogo ?
      `<img class="img-thumb" src="${currentStudy.institutionLogo}" title="Click para quitar" id="instLogoThumb">` : '';
    const thumb = document.getElementById('instLogoThumb');
    if(thumb) thumb.onclick = ()=>{ currentStudy.institutionLogo = null; renderInstLogoPreview(); renderReport(); };
  }

  function handleImages(e){
    const files = Array.from(e.target.files||[]);
    let remaining = files.length;
    files.forEach(file=>{
      const reader = new FileReader();
      reader.onload = ()=>{ pendingImages.push(reader.result); renderImagePreview(); renderReport(); };
      reader.readAsDataURL(file);
    });
  }
  function renderImagePreview(){
    const box = document.getElementById('imgPreview');
    if(!box) return;
    box.innerHTML = pendingImages.map((src,i)=>`<img class="img-thumb" src="${src}" data-i="${i}" title="Click para quitar">`).join('');
    box.querySelectorAll('img').forEach(img=>{
      img.onclick = ()=>{ pendingImages.splice(parseInt(img.dataset.i),1); renderImagePreview(); renderReport(); };
    });
  }

  /* ---------- reporte ---------- */
  function renderReport(){
    const s = currentStudy;
    const bsa = ClinicalEngine.bsa(parseFloat(s.p_peso), parseFloat(s.p_talla));
    const bmiVal = ClinicalEngine.bmi(parseFloat(s.p_peso), parseFloat(s.p_talla));
    const rows = ReportEngine.rows(s);
    const desc = descOverride!==null ? descOverride : ReportEngine.describe(s);
    const concl = conclOverride!==null ? conclOverride : ReportEngine.conclude(s);

    const grouped = {};
    rows.forEach(r=>{ (grouped[r.group]=grouped[r.group]||[]).push(r); });

    const tablesHtml = Object.keys(grouped).length ? Object.keys(grouped).map(g=>`
      <div class="rp-section">${g}</div>
      <table class="rp-table">
        <tr><th>Parámetro</th><th class="num">Valor</th><th>Unidad</th><th class="num">Rango normal</th></tr>
        ${grouped[g].map(r=>`<tr><td>${r.label}</td><td class="num${r.out?' out':''}">${r.value}</td><td>${r.unit}</td><td class="num">${r.ref}</td></tr>`).join('')}
      </table>`).join('') : '<p class="rp-empty">Sin mediciones ingresadas aún.</p>';

    document.getElementById('paper').innerHTML = `
      <div class="rp-toolbar"></div>
      <div class="rp-header">
        <div class="rp-doc">
          <img class="rp-brand-logo" src="logo.png" alt="Dr. Carlos Andrés Pérez Peralta">
        </div>
        <div class="rp-corner">
          ${s.institutionLogo ? `<img class="rp-inst-logo" src="${s.institutionLogo}" alt="Logo institucional">` : ''}
          <div class="rp-date">${s.fecha?formatDate(s.fecha):''}</div>
        </div>
      </div>
      <div class="rp-title">Informe de Ecocardiograma Doppler Color</div>
      <div class="rp-patient">
        <div><span class="l">Paciente: </span><span class="v">${s.p_nombre||'—'}</span></div>
        <div><span class="l">Documento: </span><span class="v">${s.p_doc||'—'}</span></div>
        <div><span class="l">Edad: </span><span class="v">${s.p_edad||'—'}</span></div>
        <div><span class="l">Sexo: </span><span class="v">${s.p_sexo||'—'}</span></div>
        <div><span class="l">Médico solicitante: </span><span class="v">${s.p_medsol||'—'}</span></div>
        <div><span class="l">Motivo: </span><span class="v">${s.p_motivo||'—'}</span></div>
      </div>
      <div class="rp-summary">
        <div><span class="l">BSA</span><span class="v">${bsa?bsa.toFixed(2)+' m²':'—'}</span></div>
        <div><span class="l">IMC</span><span class="v">${bmiVal?bmiVal.toFixed(1)+' kg/m²':'—'}</span></div>
        <div><span class="l">Peso</span><span class="v">${s.p_peso?s.p_peso+' kg':'—'}</span></div>
        <div><span class="l">Talla</span><span class="v">${s.p_talla?s.p_talla+' cm':'—'}</span></div>
        <div><span class="l">Frecuencia cardíaca</span><span class="v">${s.p_fc?s.p_fc+' lpm':'—'}</span></div>
        <div><span class="l">Ritmo cardíaco</span><span class="v">${s.p_ritmo||'—'}</span></div>
        <div><span class="l">Ventana acústica</span><span class="v">${s.p_ventana||'—'}</span></div>
        <div><span class="l">Método FEVI</span><span class="v">${s.metodo_fevi||'—'}</span></div>
      </div>
      ${tablesHtml}
      <div class="rp-section">Hallazgos complementarios</div>
      <div class="rp-findings">${(s.hallazgos||[]).length ? s.hallazgos.join(' · ') : '<span class="rp-empty">Sin hallazgos marcados.</span>'}</div>
      <div class="rp-section">Descripción</div>
      <div class="rp-text" id="descText" contenteditable="true">${escapeHtml(desc)}</div>
      <div class="rp-section">Conclusiones</div>
      <div class="rp-text" id="conclText" contenteditable="true">${escapeHtml(concl)}</div>
      ${pendingImages.length ? `<div class="rp-section">Imágenes</div><div class="rp-images">${pendingImages.map(src=>`<img src="${src}">`).join('')}</div>` : ''}
      <div class="rp-footer">
        <div>Informe generado electrónicamente</div>
        <div class="rp-sign">
          <img class="firma" src="firma.png" alt="Firma">
          <div class="line"></div>
          Dr. Carlos Andrés Pérez Peralta<br>Cardiólogo · Ecocardiografía Doppler Color<br>MN: 173076 · MP: 340922
        </div>
      </div>`;

    document.getElementById('descText').oninput = (e)=>{ descOverride = e.target.innerText; };
    document.getElementById('conclText').oninput = (e)=>{ conclOverride = e.target.innerText; };
  }

  function escapeHtml(str){
    return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /* ---------- guardar ---------- */
  async function saveCurrentStudy(patientId, studyId){
    readFieldsIntoStudy();
    currentStudy.mode = expressMode ? 'express' : 'full';
    currentStudy.images = pendingImages;
    currentStudy.descManual = descOverride;
    currentStudy.conclManual = conclOverride;
    try{
      if(studyId) await StudyService.update(studyId, currentStudy);
      else await StudyService.create(patientId, currentStudy);
      alert('Estudio guardado.');
      openPatient(patientId);
    }catch(e){ console.error(e); alert('No se pudo guardar el estudio.\n\n'+e.message); }
  }

  return { init };
})();

App.init();
</script>

  </div>
  <button id="contDictStop">✕ Detener</button>
</div>

<div class="voice-float-feed" id="voiceFeed"></div>

<script>
/* Service Worker inline — cachea el HTML y las librerías CDN para funcionar offline */
if('serviceWorker' in navigator){
  const swCode = `
const CACHE = 'ecoinf-v19';
const URLS = [
  self.location.pathname,
  'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js',
  'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js'
];
self.addEventListener('install', e=>{
  e.waitUntil(caches.open(CACHE).then(c=>c.addAll(URLS)).then(()=>self.skipWaiting()));
});
self.addEventListener('activate', e=>{
  e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))).then(()=>self.clients.claim()));
});
self.addEventListener('fetch', e=>{
  if(e.request.method!=='GET') return;
  /* Para Supabase: network-first (datos frescos si hay red, cache si no) */
  if(e.request.url.includes('supabase.co')){
    e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));
    return;
  }
  /* Para todo lo demás: cache-first */
  e.respondWith(caches.match(e.request).then(cached=>{
    if(cached) return cached;
    return fetch(e.request).then(resp=>{
      if(resp && resp.status===200){
        const clone = resp.clone();
        caches.open(CACHE).then(c=>c.put(e.request, clone));
      }
      return resp;
    }).catch(()=>cached);
  }));
});
`;
  const blob = new Blob([swCode], {type:'text/javascript'});
  const url = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url, {scope:'/'}).catch(()=>{});
}
</script>
