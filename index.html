<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>EcoInforme</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --ink:#1A1A1A; --gray-1:#4A4A4A; --gray-2:#777; --gray-3:#A8A8A8;
  --line:#DCDCD6; --paper:#FFFFFF; --bg:#F4F3F0; --bg-2:#EDECE8;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,'SF Pro Text',Helvetica,Arial,sans-serif;height:100%;}
button{font-family:inherit;}
.app{display:flex;height:100vh;}

/* ---------- SIDEBAR ---------- */
.sidebar{width:280px;flex-shrink:0;background:var(--paper);border-right:1px solid var(--line);
  display:flex;flex-direction:column;height:100vh;}
.sidebar-head{padding:20px 18px 14px;border-bottom:1px solid var(--line);}
.sidebar-head h1{font-size:15px;margin:0 0 2px;font-weight:600;letter-spacing:-.01em;}
.sidebar-head p{margin:0;font-size:11.5px;color:var(--gray-2);}
.search{padding:14px 16px;border-bottom:1px solid var(--line);}
.search input{width:100%;border:1px solid var(--line);border-radius:6px;padding:8px 10px;font-size:13px;background:var(--bg);}
.search input:focus{outline:none;border-color:var(--gray-3);}
.patient-list{flex:1;overflow-y:auto;}
.patient-item{padding:12px 16px;border-bottom:1px solid var(--line);cursor:pointer;}
.patient-item:hover{background:var(--bg);}
.patient-item.active{background:var(--bg-2);}
.patient-item .nm{font-size:13.5px;font-weight:600;}
.patient-item .meta{font-size:11.5px;color:var(--gray-2);margin-top:2px;}
.sidebar-foot{padding:14px 16px;border-top:1px solid var(--line);}

/* ---------- deslizar para borrar ---------- */
.swipe-wrap{position:relative;overflow:hidden;border-bottom:1px solid var(--line);}
.swipe-action{position:absolute;top:0;right:0;height:100%;width:84px;background:#B3432A;color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:700;cursor:pointer;
  letter-spacing:.02em;user-select:none;}
.swipe-content{position:relative;background:var(--paper);touch-action:pan-y;will-change:transform;}
.swipe-wrap .patient-item, .swipe-wrap .study-row{border-bottom:none;}
.btn{border:1px solid var(--ink);background:var(--ink);color:#fff;border-radius:6px;padding:9px 14px;
  font-size:13px;font-weight:600;cursor:pointer;width:100%;}
.btn:hover{opacity:.85;}
.btn-outline{background:transparent;color:var(--ink);}
.btn-text{background:none;border:none;color:var(--gray-1);font-size:12.5px;cursor:pointer;padding:4px 0;text-decoration:underline;}

/* ---------- MAIN ---------- */
.main{flex:1;overflow-y:auto;height:100vh;}
.topbar{position:sticky;top:0;background:var(--paper);border-bottom:1px solid var(--line);
  padding:12px 28px;display:flex;align-items:center;justify-content:space-between;z-index:10;}
.topbar .crumbs{font-size:13px;color:var(--gray-2);}
.topbar .crumbs b{color:var(--ink);font-weight:600;}
.topbar .actions{display:flex;gap:8px;}
.btn-sm{border:1px solid var(--line);background:var(--paper);color:var(--ink);border-radius:6px;
  padding:7px 12px;font-size:12.5px;font-weight:600;cursor:pointer;}
.btn-sm.primary{background:var(--ink);color:#fff;border-color:var(--ink);}
.content{max-width:1000px;margin:0 auto;padding:28px;}

/* empty / welcome */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:70vh;color:var(--gray-2);}
.empty-state h2{font-size:16px;color:var(--ink);font-weight:600;margin-bottom:6px;}
.empty-state p{font-size:13px;}

/* patient detail */
.patient-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;}
.patient-header h2{margin:0 0 4px;font-size:20px;font-weight:600;}
.patient-header .sub{font-size:13px;color:var(--gray-2);}
.study-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--line);cursor:pointer;}
.study-row:hover{background:var(--bg);}
.study-row .d{font-size:13.5px;font-weight:600;}
.study-row .t{font-size:12px;color:var(--gray-2);margin-top:2px;}
.section-label{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--gray-2);font-weight:600;margin:24px 0 8px;}

/* ---------- FORM (study editor) ---------- */
.editor{display:flex;gap:0;height:calc(100vh - 49px);}
.form-pane{width:46%;min-width:380px;border-right:1px solid var(--line);overflow-y:auto;padding:20px 24px 100px;position:relative;}
.ref-hint{position:absolute;display:none;background:var(--ink);color:#fff;font-size:11px;padding:4px 8px;
  border-radius:5px;z-index:30;pointer-events:none;white-space:nowrap;font-family:-apple-system,sans-serif;}
.ref-hint::after{content:'';position:absolute;left:10px;top:-4px;border:4px solid transparent;border-bottom-color:var(--ink);}
.report-pane{flex:1;overflow-y:auto;background:var(--bg);padding:30px 24px;display:flex;justify-content:center;}

.mode-toggle{display:flex;border:1px solid var(--line);border-radius:6px;overflow:hidden;margin-bottom:16px;}
.mode-toggle button{flex:1;border:none;background:var(--paper);padding:8px;font-size:12.5px;font-weight:600;cursor:pointer;color:var(--gray-1);}
.mode-toggle button.active{background:var(--ink);color:#fff;}

.voice-bar{display:flex;gap:8px;align-items:center;margin-bottom:18px;}
.voice-btn{flex:1;border:1px solid var(--ink);background:var(--paper);color:var(--ink);border-radius:6px;
  padding:11px;font-size:13px;font-weight:600;cursor:pointer;}
.voice-btn.on{background:var(--ink);color:#fff;}
.voice-feed{font-size:11.5px;color:var(--gray-2);margin-top:6px;min-height:14px;}

/* Botón de dictado flotante: acompaña el scroll en el costado derecho del formulario,
   difuminado cuando no está activo para no estorbar */
.voice-float{
  position:fixed;
  bottom:28px;
  /* se posiciona calculado por JS para quedar dentro del form-pane */
  right:calc(54% + 12px);
  width:52px;height:52px;
  border-radius:50%;
  border:none;
  background:var(--ink);
  color:#fff;
  font-size:22px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 12px rgba(0,0,0,.18);
  opacity:0.35;
  transition:opacity .2s, transform .15s;
  z-index:100;
  -webkit-user-select:none;user-select:none;
}
.voice-float:hover,.voice-float:focus{opacity:0.85;}
.voice-float.on{
  background:#B3432A;
  opacity:1;
  animation:floatPulse 1.2s infinite;
}
@keyframes floatPulse{
  0%{box-shadow:0 0 0 0 rgba(179,67,42,.4);}
  70%{box-shadow:0 0 0 12px rgba(179,67,42,0);}
  100%{box-shadow:0 0 0 0 rgba(179,67,42,0);}
}
.voice-float-feed{
  position:fixed;
  bottom:88px;
  right:calc(54% + 4px);
  width:180px;
  background:var(--ink);
  color:#fff;
  font-size:11px;
  padding:7px 10px;
  border-radius:8px;
  display:none;
  z-index:100;
  line-height:1.4;
  text-align:right;
}
.voice-float-feed.visible{display:block;}
@media(max-width:980px){
  .voice-float{right:16px;bottom:24px;}
  .voice-float-feed{right:12px;width:160px;}
}

.fgroup{border:1px solid var(--line);border-radius:8px;margin-bottom:10px;}
.fgroup-head{padding:10px 14px;cursor:pointer;font-size:12.5px;font-weight:700;letter-spacing:.03em;
  text-transform:uppercase;color:var(--gray-1);display:flex;justify-content:space-between;}
.fgroup-body{padding:0 14px 14px;display:none;}
.fgroup.open .fgroup-body{display:block;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.fitem{margin-bottom:8px;}
.fitem label{display:block;font-size:11px;color:var(--gray-2);margin-bottom:3px;}
.fitem input,.fitem select,.fitem textarea{width:100%;border:1px solid var(--line);border-radius:5px;
  padding:7px 8px;font-size:13px;background:var(--paper);}
.fitem input:focus,.fitem select:focus,.fitem textarea:focus{outline:none;border-color:var(--gray-1);}
.fitem.full{grid-column:1/3;}
.fitem textarea{min-height:50px;font-family:inherit;resize:vertical;}
/* campo escuchando: borde azul animado + fondo suave */
.fitem input.field-listening{border-color:#1B6B6B !important;background:#f0fafa !important;
  box-shadow:0 0 0 3px rgba(27,107,107,.15);}

/* Barra de modo dictado continuo */
#contDictBar{
  display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:var(--ink);color:#fff;padding:10px 16px;
  align-items:center;justify-content:space-between;gap:10px;
  box-shadow:0 -2px 12px rgba(0,0,0,.2);
}
#contDictBar.active{display:flex;}
#contDictStatus{font-size:12px;display:flex;align-items:center;gap:8px;flex:1;min-width:0;}
#contDictDot{width:10px;height:10px;border-radius:50%;background:#aaa;flex-shrink:0;transition:background .2s;}
#contDictDot.listening{background:#4caf50;animation:dotPulse .8s infinite alternate;}
#contDictDot.got{background:#4caf50;}
@keyframes dotPulse{from{opacity:.5;}to{opacity:1;}}
#contDictText{font-size:12px;opacity:.8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#contDictStop{flex-shrink:0;border:1px solid rgba(255,255,255,.4);background:transparent;color:#fff;
  border-radius:6px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;}
/* Campo activo en modo continuo: borde verde */
.field-cont-active{border-color:#4caf50 !important;background:#f0fff4 !important;}

.chip-row{display:flex;flex-wrap:wrap;gap:6px;}
.chip{border:1px solid var(--line);border-radius:14px;padding:5px 11px;font-size:11.5px;cursor:pointer;background:var(--paper);}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink);}

.bottom-actions{display:flex;gap:8px;margin-top:18px;}

/* ---------- REPORT PAPER ---------- */
.paper{width:100%;max-width:700px;background:var(--paper);box-shadow:0 1px 3px rgba(0,0,0,.08);
  padding:48px 52px;font-family:'Georgia','Times New Roman',serif;color:var(--ink);min-height:900px;}
.rp-toolbar{display:flex;justify-content:flex-end;gap:8px;margin-bottom:14px;font-family:-apple-system,sans-serif;}
.rp-header{display:flex;justify-content:space-between;border-bottom:2px solid var(--ink);padding-bottom:14px;margin-bottom:18px;}
.rp-doc h1{font-size:16.5px;margin:0;font-weight:600;}
.rp-brand-logo{max-width:280px;max-height:78px;display:block;}
.rp-corner{display:flex;flex-direction:column;align-items:flex-end;gap:8px;}
.rp-inst-logo{max-width:120px;max-height:50px;object-fit:contain;}
.rp-doc p{margin:2px 0 0;font-size:11.5px;color:var(--gray-1);font-family:-apple-system,sans-serif;}
.rp-logo{width:50px;height:50px;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;
  font-family:-apple-system,sans-serif;font-size:10px;color:var(--gray-2);overflow:hidden;}
.rp-logo img{width:100%;height:100%;object-fit:cover;}
.rp-date{text-align:right;font-size:11px;color:var(--gray-2);font-family:-apple-system,sans-serif;}
.rp-title{text-align:center;font-size:12.5px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;
  font-family:-apple-system,sans-serif;margin:4px 0 20px;}

.rp-patient{display:grid;grid-template-columns:1fr 1fr;gap:3px 24px;font-size:12.5px;font-family:-apple-system,sans-serif;
  margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--line);}
.rp-patient span.l{color:var(--gray-2);}
.rp-patient span.v{font-weight:600;}

.rp-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px 18px;font-size:11.5px;font-family:-apple-system,sans-serif;
  margin-bottom:20px;color:var(--gray-1);}
.rp-summary div span.l{display:block;color:var(--gray-2);font-size:10px;text-transform:uppercase;letter-spacing:.03em;}
.rp-summary div span.v{font-weight:600;color:var(--ink);}

.rp-section{font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;color:var(--ink);
  font-family:-apple-system,sans-serif;border-bottom:1px solid var(--ink);padding-bottom:4px;margin:22px 0 8px;}

table.rp-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:6px;}
table.rp-table th{font-family:-apple-system,sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:.02em;
  color:var(--gray-2);text-align:left;font-weight:600;border-bottom:1px solid var(--ink);padding:4px 6px;}
table.rp-table th.num{text-align:right;}
table.rp-table td{padding:4px 6px;border-bottom:1px solid var(--line);}
table.rp-table td.num{text-align:right;font-family:'Georgia',serif;}
table.rp-table td.out{font-weight:700;}

.rp-text{font-size:13px;line-height:1.6;white-space:pre-wrap;width:100%;font-family:'Georgia',serif;
  color:var(--ink);min-height:1.6em;}
.rp-text:focus{outline:1px dashed var(--gray-3);}

.rp-findings{font-size:11.5px;font-family:-apple-system,sans-serif;color:var(--gray-1);}
.rp-empty{font-size:11px;color:var(--gray-3);font-style:italic;font-family:-apple-system,sans-serif;}

.rp-images{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
.rp-images img{width:120px;height:90px;object-fit:cover;border:1px solid var(--line);}

.rp-footer{margin-top:36px;padding-top:12px;border-top:1px solid var(--line);display:flex;justify-content:space-between;
  align-items:flex-end;font-size:10.5px;color:var(--gray-2);font-family:-apple-system,sans-serif;}
.rp-sign{text-align:right;}
.rp-sign img.firma{width:140px;display:block;margin:0 0 -10px auto;mix-blend-mode:multiply;}
.rp-sign .line{width:180px;border-top:1px solid var(--ink);margin:4px 0 4px auto;}

.img-upload-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
.img-thumb{width:60px;height:46px;object-fit:cover;border:1px solid var(--line);position:relative;cursor:pointer;}

@media (max-width:980px){
  .sidebar{width:220px;}
  .editor{flex-direction:column;height:auto;}
  .form-pane,.report-pane{width:100%;min-width:0;border-right:none;height:auto;}
}
@media (max-width:760px){
  .app{flex-direction:column;}
  .sidebar{width:100%;height:auto;max-height:40vh;}
  .main{height:auto;}
}

/* ---------- IMPRESIÓN ---------- */
@media print{
  html, body{height:auto;background:#fff;}
  /* Ocultar TODA la UI — solo debe verse el informe */
  .sidebar, .form-pane, .topbar, .rp-toolbar, .empty-state,
  .voice-float, .voice-float-feed, #contDictBar, #fieldDictPanel,
  #voiceBtn, #voiceFeed, #refHint,
  button, [id^="btnPdf"]{display:none !important;} .rp-footer > div:first-child{display:none !important;}
  .app, .main, .editor, .report-pane{display:block !important;height:auto !important;overflow:visible !important;width:100% !important;}
  .report-pane{padding:0 !important;background:#fff !important;}
  .paper{
    box-shadow:none !important;max-width:none !important;width:100% !important;
    padding:0 !important;min-height:0 !important;margin:0 auto;
  }
  /* nunca cortar una sección, fila de tabla, párrafo o bloque a la mitad entre dos hojas */
  .rp-header, .rp-patient, .rp-summary, .rp-section, .rp-findings, .rp-text,
  .rp-images, .rp-footer, table.rp-table, table.rp-table tr{
    page-break-inside: avoid;
    break-inside: avoid;
  }
  .rp-section{ page-break-after: avoid; break-after: avoid; }
  /* La firma debe verse en blanco y negro correctamente */
  .rp-sign img.firma{ -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  @page{ margin: 15mm; }
}
</style>

<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-head">
      <h1>EcoInforme</h1>
      <p>Dr. Carlos Andrés Pérez Peralta</p>
    </div>
    <div class="search"><input id="patientSearch" placeholder="Buscar paciente..."></div>
    <div class="patient-list" id="patientList"></div>
    <div class="sidebar-foot">
      <button class="btn" id="btnNewPatient">+ Nuevo paciente</button>
      <div id="syncStatus" style="text-align:center;font-size:10px;color:var(--gray-3);margin-top:6px;">●  En línea</div>
      <div style="text-align:center;font-size:10px;color:var(--gray-3);margin-top:2px;">build 2026-06-25-r20</div>
    </div>
  </div>
  <div class="main" id="main"></div>
</div>

<script>
/* =====================================================================
   ARQUITECTURA
   - Store          : acceso genérico a Supabase (REST API) (get/set/list)
   - PatientService : CRUD de pacientes
   - StudyService   : CRUD de estudios (ligados a un paciente)
   - ReferenceRanges: tabla de valores normales (ASE/EACVI)
   - ClinicalEngine : cálculos (BSA, FEVI, diástole, válvulas)
   - ReportEngine   : filas de mediciones + descripción + conclusiones
   - VoiceEngine    : dictado de frases completas -> múltiples campos
   - PdfService     : exportación a PDF
   - Router/UI      : pantallas (lista pacientes, detalle, editor estudio)
   Cada servicio es independiente; nuevos módulos (Holter, MAPA, Agenda)
   se agregan como servicios + pantallas nuevas sin tocar los existentes.
   ===================================================================== */

/* ---------------- Supabase config ---------------- */
const SUPABASE_URL = 'https://bnjoonrrwgbmegsbbwwi.supabase.co';
const SUPABASE_KEY = 'sb_publishable__v3RdhJpN8Fx9nyROZ6uaA_IPEsyf-S';

/* ---------------- SupabaseClient ---------------- */
const SupabaseClient = (()=>{
  const base = SUPABASE_URL.replace(/\/$/,'') + '/rest/v1';
  const headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json'
  };
  async function select(table, query=''){
    const res = await fetch(`${base}/${table}?${query}`, { headers });
    if(!res.ok) throw new Error('Supabase select '+table+' falló: '+res.status);
    return res.json();
  }
  async function insert(table, payload){
    const res = await fetch(`${base}/${table}`, {
      method:'POST', headers: { ...headers, 'Prefer':'return=representation' },
      body: JSON.stringify(payload)
    });
    if(!res.ok) throw new Error('Supabase insert '+table+' falló: '+res.status+' '+await res.text());
    const rows = await res.json();
    return rows[0];
  }
  async function update(table, id, payload){
    const res = await fetch(`${base}/${table}?id=eq.${id}`, {
      method:'PATCH', headers: { ...headers, 'Prefer':'return=representation' },
      body: JSON.stringify(payload)
    });
    if(!res.ok) throw new Error('Supabase update '+table+' falló: '+res.status+' '+await res.text());
    const rows = await res.json();
    return rows[0];
  }
  async function del(table, id){
    const res = await fetch(`${base}/${table}?id=eq.${id}`, { method:'DELETE', headers });
    if(!res.ok) throw new Error('Supabase delete '+table+' falló: '+res.status+' '+await res.text());
  }
  return { select, insert, update, del };
})();

/* ---------------- PatientService ---------------- */
/* ================================================================
   CAPA OFFLINE — LocalCache
   Lee siempre desde localStorage (instantáneo, sin red).
   Sincroniza con Supabase en segundo plano cuando hay conexión.
   Si no hay red: guarda localmente y sincroniza cuando vuelve.
   ================================================================ */
const LocalCache = (()=>{
  const KEY_PATIENTS = 'eco_patients_v1';
  const KEY_STUDIES  = 'eco_studies_v1';
  const KEY_QUEUE    = 'eco_sync_queue_v1';

  function loadPatients(){ try{ return JSON.parse(localStorage.getItem(KEY_PATIENTS)||'[]'); }catch(e){ return []; } }
  function savePatients(arr){ try{ localStorage.setItem(KEY_PATIENTS, JSON.stringify(arr)); }catch(e){} }
  function loadStudies(){ try{ return JSON.parse(localStorage.getItem(KEY_STUDIES)||'[]'); }catch(e){ return []; } }
  function saveStudies(arr){ try{ localStorage.setItem(KEY_STUDIES, JSON.stringify(arr)); }catch(e){} }
  function loadQueue(){ try{ return JSON.parse(localStorage.getItem(KEY_QUEUE)||'[]'); }catch(e){ return []; } }
  function saveQueue(arr){ try{ localStorage.setItem(KEY_QUEUE, JSON.stringify(arr)); }catch(e){} }

  function enqueue(op){ const q=loadQueue(); q.push({...op, ts:Date.now()}); saveQueue(q); }

  function genLocalId(){ return 'local_'+Date.now()+'_'+Math.random().toString(36).slice(2); }

  /* Sincroniza la cola pendiente con Supabase en segundo plano */
  async function syncQueue(){
    if(!navigator.onLine) return;
    const q = loadQueue();
    if(!q.length) return;
    const remaining = [];
    for(const op of q){
      try{
        if(op.type==='createPatient'){
          const real = await SupabaseClient.insert('patients', op.data);
          // reemplazar el id local por el real en el cache
          const pts = loadPatients().map(p=> p.id===op.localId ? {...p, id:real.id} : p);
          savePatients(pts);
          const sts = loadStudies().map(s=> s.patientId===op.localId ? {...s, patientId:real.id} : s);
          saveStudies(sts);
        } else if(op.type==='updatePatient'){
          await SupabaseClient.update('patients', op.id, op.data);
        } else if(op.type==='deletePatient'){
          await SupabaseClient.del('patients', op.id);
        } else if(op.type==='createStudy'){
          const real = await SupabaseClient.insert('studies', op.data);
          const sts = loadStudies().map(s=> s.id===op.localId ? {...s, id:real.id} : s);
          saveStudies(sts);
        } else if(op.type==='updateStudy'){
          await SupabaseClient.update('studies', op.id, op.data);
        } else if(op.type==='deleteStudy'){
          await SupabaseClient.del('studies', op.id);
        }
      }catch(e){ remaining.push(op); }
    }
    saveQueue(remaining);
  }

  /* Refresca el cache local desde Supabase (cuando hay señal) */
  async function refreshFromServer(){
    if(!navigator.onLine) return false;
    try{
      const pts = await SupabaseClient.select('patients','select=*&order=nombre.asc');
      savePatients(pts);
      return true;
    }catch(e){ return false; }
  }

  window.addEventListener('online', ()=>{ syncQueue(); });

  return { loadPatients, savePatients, loadStudies, saveStudies, enqueue, genLocalId, syncQueue, refreshFromServer };
})();

const PatientService = (()=>{
  async function list(){
    /* Siempre devuelve el cache local inmediatamente */
    const local = LocalCache.loadPatients();
    /* Refresca en segundo plano sin bloquear la UI */
    LocalCache.refreshFromServer().then(ok=>{
      if(ok && window._onPatientsRefreshed) window._onPatientsRefreshed();
    });
    return local.sort((a,b)=>(a.nombre||'').localeCompare(b.nombre||''));
  }
  async function create(data){
    const localId = LocalCache.genLocalId();
    const p = { id:localId, nombre:data.nombre||'', documento:data.documento||'', edad:data.edad||'', sexo:data.sexo||'' };
    const pts = LocalCache.loadPatients(); pts.push(p); LocalCache.savePatients(pts);
    LocalCache.enqueue({ type:'createPatient', localId, data:{ nombre:p.nombre, documento:p.documento, edad:p.edad, sexo:p.sexo } });
    LocalCache.syncQueue();
    return p;
  }
  async function update(id, data){
    const pts = LocalCache.loadPatients().map(p=> p.id===id ? {...p,...data} : p);
    LocalCache.savePatients(pts);
    if(!id.startsWith('local_')){
      LocalCache.enqueue({ type:'updatePatient', id, data });
      LocalCache.syncQueue();
    }
    return pts.find(p=>p.id===id);
  }
  async function get(id){
    return LocalCache.loadPatients().find(p=>p.id===id) || null;
  }
  async function remove(id){
    LocalCache.savePatients(LocalCache.loadPatients().filter(p=>p.id!==id));
    LocalCache.saveStudies(LocalCache.loadStudies().filter(s=>s.patientId!==id));
    if(!id.startsWith('local_')){
      LocalCache.enqueue({ type:'deletePatient', id });
      LocalCache.syncQueue();
    }
  }
  return { list, create, update, get, remove };
})();

/* ---------------- StudyService ---------------- */
/* Cada estudio se guarda como una fila con patient_id, fecha (para listar/ordenar)
   y el resto de los campos clínicos comprimidos en la columna jsonb "data". */
const StudyService = (()=>{
  function toRow(patientId, data){
    return { patient_id: patientId, fecha: data.fecha || null, data };
  }
  function fromRow(row){
    return { id: row.id, patientId: row.patient_id, savedAt: row.saved_at||row.savedAt, fecha: row.fecha, ...row.data };
  }
  async function listByPatient(patientId){
    /* Usa el cache local — instantáneo, sin red */
    const local = LocalCache.loadStudies()
      .filter(s=> s.patientId===patientId)
      .sort((a,b)=> (b.fecha||'').localeCompare(a.fecha||''));
    /* Sincroniza en segundo plano */
    if(navigator.onLine && !patientId.startsWith('local_')){
      SupabaseClient.select('studies',
        `select=id,patient_id,fecha,saved_at,data->>vi_fevi&patient_id=eq.${patientId}&order=fecha.desc`)
      .then(rows=>{
        const updated = rows.map(r=>({ id:r.id, patientId:r.patient_id, savedAt:r.saved_at, fecha:r.fecha, vi_fevi:r.vi_fevi }));
        const others = LocalCache.loadStudies().filter(s=>s.patientId!==patientId);
        LocalCache.saveStudies([...others, ...updated]);
      }).catch(()=>{});
    }
    return local.map(s=>({ id:s.id, patientId:s.patientId, savedAt:s.savedAt, fecha:s.fecha, vi_fevi:s.vi_fevi }));
  }
  async function create(patientId, data){
    const localId = LocalCache.genLocalId();
    const study = { id:localId, patientId, savedAt:new Date().toISOString(), ...data };
    const sts = LocalCache.loadStudies(); sts.push(study); LocalCache.saveStudies(sts);
    if(!patientId.startsWith('local_')){
      LocalCache.enqueue({ type:'createStudy', localId, data:toRow(patientId, data) });
      LocalCache.syncQueue().then(()=>{});
    }
    return study;
  }
  async function update(id, data){
    const sts = LocalCache.loadStudies().map(s=> s.id===id ? {...s,...data,savedAt:new Date().toISOString()} : s);
    LocalCache.saveStudies(sts);
    if(!id.startsWith('local_')){
      LocalCache.enqueue({ type:'updateStudy', id, data:{ fecha:data.fecha||null, data } });
      LocalCache.syncQueue().then(()=>{});
    }
    return sts.find(s=>s.id===id);
  }
  async function get(id){
    const local = LocalCache.loadStudies().find(s=>s.id===id);
    if(local) return fromRow({...local, patient_id:local.patientId, saved_at:local.savedAt});
    /* Si no está en cache, pide a Supabase */
    if(navigator.onLine){
      const rows = await SupabaseClient.select('studies', `select=*&id=eq.${id}`);
      if(rows[0]){
        const study = fromRow(rows[0]);
        const sts = LocalCache.loadStudies(); sts.push({...study, patientId:study.patientId});
        LocalCache.saveStudies(sts);
        return study;
      }
    }
    return null;
  }
  async function remove(id){
    LocalCache.saveStudies(LocalCache.loadStudies().filter(s=>s.id!==id));
    if(!id.startsWith('local_')){
      LocalCache.enqueue({ type:'deleteStudy', id });
      LocalCache.syncQueue().then(()=>{});
    }
  }
  return { listByPatient, create, update, get, remove };
})();

    vao_frreg:    {unit:'%', range:()=>[0,30]},      // ≥50% = severa
    vmi_gradm:    {unit:'mmHg', range:()=>[0,5]},

/* ---------------- ClinicalEngine ---------------- */
const ClinicalEngine = (()=>{
  function bsa(pesoKg, tallaCm){
    if(!pesoKg || !tallaCm) return null;
    return Math.sqrt((pesoKg*tallaCm)/3600); // Mosteller
  }
  /* IMC/BMI = peso(kg) / talla(m)² */
  function bmi(pesoKg, tallaCm){
    if(!pesoKg || !tallaCm) return null;
    const tallaM = tallaCm/100;
    return pesoKg/(tallaM*tallaM);
  }
  function classifyFEVI(f, sex){
    if(f===null||f===undefined||f==='') return null;
    f = parseFloat(f);
    const cut = sex==='Femenino' ? 54 : 52;
    if(f>=cut) return {label:'Conservada', cat:'normal'};
    if(f>=41) return {label:'Levemente deprimida', cat:'leve'};
    if(f>=30) return {label:'Moderadamente deprimida', cat:'moderada'};
    return {label:'Severamente deprimida', cat:'severa'};
  }
  /* Algoritmo ASE 2025 (reemplaza al ASE/EACVI 2016): paso 1 identifica relajación alterada
     mediante velocidad e' anular; paso 2 evalúa marcadores de presión de llenado elevada
     (E/e' >14, E/A ≤0.8 o ≥2, volumen indexado de AI >34). Elimina la categoría "indeterminado".
     Nota: la guía 2025 también incorpora strain de reservorio de AI (LARS ≤18%), que esta
     aplicación no calcula por no contar con speckle-tracking; se deja como limitación conocida. */
  function classifyDiastolic(d){
    if(d.p_ritmo==='Fibrilación auricular') return classifyDiastolicAF(d);
    const e=num(d.d_e), a=num(d.d_a), es=num(d.d_eseptal), el=num(d.d_elateral), voli=num(d.ai_voli);
    if(e===null && a===null && es===null && el===null) return null;
    let eAvg = (es!==null && el!==null) ? (es+el)/2 : null;
    let ee = (eAvg && e!==null) ? e/eAvg : ((es!==null&&e!==null)?e/es:((el!==null&&e!==null)?e/el:null));
    let ea = (e!==null && a!==null) ? e/a : null;

    /* Paso 1: relajación alterada (e' anular reducida) */
    let impairedRelax = null;
    if(es!==null && el!==null) impairedRelax = eAvg<=6.5;
    else if(es!==null) impairedRelax = es<=6;
    else if(el!==null) impairedRelax = el<=7;

    /* Paso 2: marcadores de presión de llenado elevada (E/e' y volumen indexado de AI;
       E/A se usa aparte para definir el patrón, no se cuenta dos veces como marcador) */
    let markers=0, evaluated=0;
    if(ee!==null){ evaluated++; if(ee>14) markers++; }
    if(voli!==null){ evaluated++; if(voli>34) markers++; }

    let lapElevated;
    if(impairedRelax===true) lapElevated = markers>=1;
    else if(impairedRelax===false) lapElevated = markers>=2;
    else lapElevated = markers>=2;

    /* Patrón restrictivo (E/A ≥2): casi siempre implica presión de llenado elevada */
    if(ea!==null && ea>=2){
      return { label:'Disfunción diastólica grado III', cat:'gradoIII', grade:'Grado III', pattern:'Restrictivo', lap:'Elevada', ee, ea, impairedRelax, markers };
    }

    /* Patrón de relajación alterada (E/A ≤0.8): por definición, presión de llenado NORMAL,
       salvo que los marcadores indiquen lo contrario (hallazgo discordante, infrecuente) */
    if(ea!==null && ea<=0.8){
      if(lapElevated){
        return { label:'Disfunción diastólica grado I, con marcadores discordantes de presión de llenado elevada', cat:'gradoI', grade:'Grado I (hallazgo discordante)', pattern:'Relajación alterada', lap:'Elevada', ee, ea, impairedRelax, markers };
      }
      return { label:'Disfunción diastólica grado I', cat:'gradoI', grade:'Grado I', pattern:'Relajación alterada', lap:'Normal', ee, ea, impairedRelax, markers };
    }

    /* Sin relajación alterada y sin marcadores de presión elevada: función normal */
    if(impairedRelax!==true && !lapElevated){
      return { label:'Normal', cat:'normal', grade:'Normal', pattern:'Normal', lap:'Normal', ee, ea, impairedRelax, markers };
    }

    /* Presión de llenado elevada con E/A intermedio (o no disponible): patrón pseudonormal, Grado II */
    if(lapElevated){
      return { label:'Disfunción diastólica grado II', cat:'gradoII', grade:'Grado II', pattern:'Pseudonormal', lap:'Elevada', ee, ea, impairedRelax, markers };
    }

    /* Relajación alterada aislada, sin E/A disponible y sin marcadores elevados */
    if(impairedRelax===true){
      return { label:'Disfunción diastólica grado I', cat:'gradoI', grade:'Grado I', pattern:'Relajación alterada', lap:'Normal', ee, ea, impairedRelax, markers };
    }

    return { label:'Normal', cat:'normal', grade:'Normal', pattern:'Normal', lap:'Normal', ee, ea, impairedRelax, markers };
  }

  /* Evaluación de presión de llenado en fibrilación auricular: en FA el flujo mitral es
     monofásico (no hay onda A por ausencia de contracción atrial organizada), por lo que
     E/A no es aplicable. Se usa onda E, tiempo de desaceleración (DT) e IVRT, junto con
     E/e' septal (el lateral es menos fiable en FA), según la evidencia más reciente. */
  function classifyDiastolicAF(d){
    const e=num(d.d_e), es=num(d.d_eseptal), dt=num(d.d_dt), ivrt=num(d.d_ivrt);
    if(e===null && es===null && dt===null && ivrt===null) return null;
    const ee = (e!==null && es!==null) ? Math.round((e/es)*100)/100 : null;
    let positives=0, evaluated=0;
    if(dt!==null){ evaluated++; if(dt<160) positives++; }
    if(ivrt!==null){ evaluated++; if(ivrt<65) positives++; }
    if(ee!==null){ evaluated++; if(ee>11) positives++; }
    if(evaluated===0) return null;
    const lap = positives>=1 ? 'Elevada' : 'Normal';
    return {
      label: positives>=1 ? 'Presión de llenado del VI elevada' : 'Presión de llenado del VI no elevada',
      cat: positives>=1 ? 'gradoII' : 'normal',
      grade: positives>=1 ? 'No graduable (FA)' : 'Normal',
      pattern: 'Monofásico (sin onda A) por fibrilación auricular',
      lap, ee, ea:null, positives, evaluated, isAF:true
    };
  }

  function classifyAortic(d){
    const vmax=num(d.vao_vmax), gradm=num(d.vao_gradm), area=num(d.vao_area);
    if(vmax===null && gradm===null && area===null) return null;
    if((area!==null&&area<1.0)||(gradm!==null&&gradm>=40)||(vmax!==null&&vmax>=4)) return {label:'Estenosis aórtica severa', cat:'severa'};
    if((area!==null&&area<1.5)||(gradm!==null&&gradm>=20)||(vmax!==null&&vmax>=3)) return {label:'Estenosis aórtica moderada', cat:'moderada'};
    if((vmax!==null&&vmax>2.5)||(gradm!==null&&gradm>10)||(area!==null&&area<2.0)) return {label:'Estenosis aórtica leve / esclerosis aórtica', cat:'leve'};
    return {label:'Sin estenosis significativa', cat:'normal'};
  }
  function num(v){ if(v===undefined||v===null||v==='') return null; const n=parseFloat(String(v).replace(',','.')); return isNaN(n)?null:n; }

  /* FEVI por Simpson biplano (si hay volúmenes) o Teichholz (si hay DDVI/DSVI) */
  /* El método elegido por el médico (Simpson / Teichholz / Visual) determina cuál fórmula
     se usa. Los demás valores ingresados quedan como dato visible, pero no se usan para
     calcular la FEVI salvo que correspondan al método seleccionado. Si todavía no se eligió
     método, se usa el que mejor se adapte a los datos disponibles (Simpson si hay volúmenes,
     si no Teichholz). "Visual" nunca calcula: la FEVI queda 100% a cargo del médico. */
  /* FEVI por Simpson biplano (requiere volúmenes telediastólico/telesistólico) */
  function calcFEVISimpson(d){
    const edv=num(d.vi_vtd), esv=num(d.vi_vts);
    if(edv!==null && esv!==null && edv>0) return { value: Math.round(((edv-esv)/edv)*100), method:'Simpson biplano' };
    return null;
  }
  /* FEVI por Teichholz (requiere DDVI/DSVI) */
  function calcFEVITeichholz(d){
    const ddvi=num(d.vi_ddvi), dsvi=num(d.vi_dsvi);
    if(ddvi!==null && dsvi!==null && ddvi>0){
      const ddCm = ddvi/10, dsCm = dsvi/10;
      const teichEdv = (7/(2.4+ddCm))*Math.pow(ddCm,3);
      const teichEsv = (7/(2.4+dsCm))*Math.pow(dsCm,3);
      if(teichEdv>0) return { value: Math.round(((teichEdv-teichEsv)/teichEdv)*100), method:'Teichholz' };
    }
    return null;
  }
  /* Ambos métodos se calculan siempre en paralelo, con los datos que haya disponibles.
     El campo "Método de cálculo de FEVI" sólo elige cuál de los dos resultados ya
     calculados se usa como FEVI del informe. "Visual" no usa ninguno: queda 100%
     a cargo del médico. Si todavía no se eligió método, se usa Simpson si hay datos,
     si no Teichholz. */
  function calcFEVI(d){
    const method = d.metodo_fevi;
    if(method==='Visual') return null;
    const simpson = calcFEVISimpson(d);
    const teichholz = calcFEVITeichholz(d);
    if(method==='Simpson biplano') return simpson;
    if(method==='Teichholz') return teichholz;
    return simpson || teichholz;
  }

  /* Masa de VI (fórmula lineal ASE) y masa indexada por BSA */
  function calcMass(d, bsaVal){
    const ddvi=num(d.vi_ddvi), siv=num(d.vi_siv), pp=num(d.vi_pp);
    if(ddvi===null || siv===null || pp===null) return null;
    const ddCm = ddvi/10, sivCm = siv/10, ppCm = pp/10;
    const mass = 0.8 * (1.04 * (Math.pow(ddCm+sivCm+ppCm,3) - Math.pow(ddCm,3))) + 0.6;
    const massi = bsaVal ? mass/bsaVal : null;
    return { mass: Math.round(mass), massIndexed: massi!==null ? Math.round(massi*10)/10 : null };
  }

  /* Espesor parietal relativo y geometría del VI (ASE) */
  function calcGeometry(d, massIndexed, sex){
    const ddvi=num(d.vi_ddvi), pp=num(d.vi_pp);
    if(ddvi===null || pp===null) return null;
    const rwt = Math.round(((2*pp)/ddvi)*100)/100;
    if(massIndexed===null || massIndexed===undefined) return { rwt, label:null };
    const massCut = sex==='Femenino' ? 95 : 115;
    const increasedMass = massIndexed > massCut;
    const increasedRWT = rwt > 0.42;
    let label;
    if(!increasedMass && !increasedRWT) label = 'Geometría normal';
    else if(!increasedMass && increasedRWT) label = 'Remodelado concéntrico';
    else if(increasedMass && increasedRWT) label = 'Hipertrofia concéntrica';
    else label = 'Hipertrofia excéntrica';
    return { rwt, label };
  }

  /* Relación E/A y E/e' */
  function calcEA(d){
    const e=num(d.d_e), a=num(d.d_a);
    if(e===null||a===null||a===0) return null;
    return Math.round((e/a)*100)/100;
  }
  function calcEe(d){
    const e=num(d.d_e), es=num(d.d_eseptal), el=num(d.d_elateral);
    if(e===null) return null;
    const eAvg = (es!==null && el!==null) ? (es+el)/2 : (es!==null?es:el);
    if(!eAvg) return null;
    return Math.round((e/eAvg)*100)/100;
  }

  /* Área valvular aórtica por ecuación de continuidad: AVA = (π·(d/2)²) × (Vmax TSVI / Vmax Ao) */
  function calcAVA(d){
    const diam=num(d.tsvi_diam), vTsvi=num(d.tsvi_vmax), vAo=num(d.vao_vmax);
    if(diam===null || vTsvi===null || vAo===null || vAo===0) return null;
    const radiusCm = (diam/10)/2;
    const csa = Math.PI * radiusCm * radiusCm;
    const ava = csa * (vTsvi/vAo);
    return Math.round(ava*100)/100;
  }

  /* Índice de motilidad segmentaria (WMSI) y territorios coronarios comprometidos.
     Los segmentos no evaluados se asumen Normales (la app nunca exige completarlos todos). */
  function calcWallMotion(d){
    const segIds = Object.keys(SEGMENT_LABELS);
    let sum=0, abnormal=[];
    segIds.forEach(id=>{
      const v = d[id] || 'Normal';
      const score = SEGMENT_SCORES[v] || 1;
      sum += score;
      if(score>1) abnormal.push({ id, label:SEGMENT_LABELS[id], value:v, territory:SEGMENT_TERRITORY[id] });
    });
    const wmsi = Math.round((sum/segIds.length)*100)/100;
    const territoryCounts = {};
    abnormal.forEach(s=>{ territoryCounts[s.territory] = (territoryCounts[s.territory]||0)+1; });
    let suggestedTerritory = null;
    Object.keys(territoryCounts).forEach(t=>{
      if(territoryCounts[t]>=2 && (!suggestedTerritory || territoryCounts[t]>territoryCounts[suggestedTerritory])) suggestedTerritory = t;
    });
    return { wmsi, abnormal, territoryCounts, suggestedTerritory };
  }

  /* ================================================================
     MOTOR DE CÁLCULOS HEMODINÁMICOS — ASE/ESC 2024
     ================================================================ */

  /* --- 1. CONTINUIDAD: AVA = (ATSVI × VTI_TSVI) / VTI_Ao
            También calcula Vmax TSVI→ Ao y verifica consistencia      */
  function calcAVA(d){
    const dTSVI = num(d.tsvi_diam), vTSVI = num(d.tsvi_vmax), vAo = num(d.vao_vmax);
    const itvTSVI = num(d.tsvi_vtitsvi), itvAo = num(d.vao_vtiao);
    if(dTSVI===null || vAo===null) return null;
    const rTSVI = (dTSVI/10)/2;
    const aTSVI = Math.PI*rTSVI*rTSVI; // cm²
    // Preferir método VTI (más preciso) sobre Vmax si está disponible
    if(itvTSVI!==null && itvAo!==null && itvAo>0)
      return Math.round(aTSVI*itvTSVI/itvAo*100)/100;
    if(vTSVI!==null && vAo>0)
      return Math.round(aTSVI*vTSVI/vAo*100)/100;
    return null;
  }

  /* --- 2. VOLUMEN SISTÓLICO & GASTO CARDÍACO (método Doppler)
            SV = ATSVI × VTI_TSVI   CO = SV × FC                      */
  function calcSVCO(d){
    const dTSVI = num(d.tsvi_diam), itvTSVI = num(d.tsvi_vtitsvi), fc = num(d.p_fc);
    if(dTSVI===null || itvTSVI===null) return null;
    const rTSVI = (dTSVI/10)/2;
    const sv = Math.round(Math.PI*rTSVI*rTSVI*itvTSVI*10)/10; // ml
    const co = fc!==null ? Math.round(sv*fc/1000*10)/10 : null; // L/min
    return { sv, co };
  }

  /* --- 3. BERNOULLI SIMPLIFICADA: Gradiente = 4 × Vmax²
            Para cualquier flujo obstructivo                             */
  function bernoulli(vmax){ return vmax!==null ? Math.round(4*vmax*vmax) : null; }

  /* --- 4. PSAP = 4 × VmaxTR² + PAD
            PAD estimada por VCI y colapso inspiratorio (ASE 2021)      */
  function calcPSAP(d){
    const vtr = num(d.d_vtr || d.pul_vtr);
    if(vtr===null) return null;
    const vci = num(d.pul_vci);
    // PAD estimada: VCI ≤21mm → 3 mmHg; VCI >21mm → 8 mmHg; sin dato → 5 mmHg
    const pad = vci!==null ? (vci<=21 ? 3 : 8) : 5;
    return Math.round(4*vtr*vtr + pad);
  }

  /* --- 5. PRESIÓN DE LLENADO VI: E/e' promedio (ASE 2024)
            Promedio de e' septal y lateral cuando ambos disponibles    */
  function calcEoverEprime(d){
    const e = num(d.d_e), es = num(d.d_eseptal), el = num(d.d_elateral);
    if(e===null) return null;
    if(es!==null && el!==null) return Math.round(e/((es+el)/2)*10)/10;
    if(es!==null) return Math.round(e/es*10)/10;
    if(el!==null) return Math.round(e/el*10)/10;
    return null;
  }

  /* --- 6. ÁREA MITRAL POR PRESIÓN MEDIO TIEMPO (PHT)
            MVA = 220/PHT   (Henry/Hatle, validado en estenosis mitral)
            MVA por DT: MVA ≈ 759/DT  (alternativa)                    */
  function calcMVA(d){
    const pht = num(d.d_pht), dt = num(d.d_dt);
    if(pht!==null && pht>0) return Math.round(220/pht*100)/100;
    if(dt!==null && dt>0)   return Math.round(759/dt*100)/100;
    return null;
  }

  /* --- 7. CUANTIFICACIÓN INSUFICIENCIA VALVULAR (PISA + Continuidad)
            EROA (cm²) = 2π × r² × Va / Vmax_reg   (Va=40 cm/s)
            Vol_reg (ml) = EROA × VTI_reg
            Forward SV (ml) = ATSVI × VTI_TSVI
            FR (%) = Vol_reg / Forward_SV × 100                        */
  function calcRegurg(d, prefix){
    const r      = num(d[prefix+'_pisa']);    // mm
    const vmaxR  = num(d[prefix+'_vmaxr']);   // m/s
    const eroa0  = num(d[prefix+'_eroa']);    // cm² (ingresado)
    const itvR   = num(d[prefix+'_itvr']);    // cm VTI jet
    const dTSVI  = num(d.tsvi_diam);          // mm
    const itvTSVI= num(d[prefix==='vmi'?'vmi_icvao':'vao_icvt']); // cm VTI TSVI
    const va     = 40; // cm/s aliasing velocity estándar

    // EROA por PISA
    let eroa = eroa0;
    if(eroa===null && r!==null && vmaxR!==null && vmaxR>0){
      const rCm = r/10;
      eroa = Math.round(2*Math.PI*rCm*rCm*va/(vmaxR*100)*100)/100;
    }

    // Vol_reg = EROA × VTI_reg
    let vreg = num(d[prefix+'_vreg']);
    if(vreg===null && eroa!==null && itvR!==null)
      vreg = Math.round(eroa*itvR*10)/10;

    // Forward SV = ATSVI × VTI_TSVI
    let fwdSV = null;
    if(dTSVI!==null && itvTSVI!==null){
      const rT = (dTSVI/10)/2;
      fwdSV = Math.round(Math.PI*rT*rT*itvTSVI*10)/10;
    }

    // FR = Vol_reg / Forward_SV × 100
    let fr = num(d[prefix+'_frreg']);
    if(fr===null && vreg!==null && fwdSV!==null && fwdSV>0)
      fr = Math.round(vreg/fwdSV*100);

    return { eroa, vreg, fwdSV, fr };
  }

  /* --- 8. PHT PARA INSUFICIENCIA AÓRTICA
            PHT <200ms → IA severa, 200-500ms → moderada, >500ms → leve
            Devuelve la clasificación de severidad sugerida por PHT      */
  function classifyARbyPHT(pht){
    if(pht===null) return null;
    if(pht<200) return 'Severa (PHT <200ms)';
    if(pht<500) return 'Moderada (PHT 200-500ms)';
    return 'Leve (PHT >500ms)';
  }

  /* --- 9. ÍNDICE DE PERFORMANCE MIOCÁRDICA (Tei index)
            Tei = (TRIV + TRCP) / TEY — omitido por requerir parámetros adicionales */

  return {
    bsa, bmi,
    classifyFEVI, classifyDiastolic, classifyAortic,
    num, bernoulli,
    calcFEVI, calcFEVISimpson, calcFEVITeichholz,
    calcMass, calcGeometry, calcEA, calcEe,
    calcAVA, calcSVCO, calcPSAP, calcEoverEprime, calcMVA,
    calcWallMotion, calcRegurg, classifyARbyPHT
  };
})();

/* ---------------- ReportEngine ---------------- */
const ReportEngine = (()=>{
  function rows(study){
    const sex = study.p_sexo;
    const out = [];
    const bsaVal = ClinicalEngine.bsa(parseFloat(study.p_peso), parseFloat(study.p_talla));
    FIELD_GROUPS.forEach(g=>{
      const allFields = g.fields.concat((g.id==='motilidad') ? [] : (g.conditionalFields||[]));
      allFields.forEach(([id,label])=>{
        const v = study[id];
        if(v===undefined||v===null||v==='') return;
        const ref = ReferenceRanges.get(id, sex);
        const num = parseFloat(String(v).replace(',','.'));
        let out_of_range = false;
        if(ref && !isNaN(num)) out_of_range = num<ref.min || num>ref.max;
        out.push({
          group:g.label, label, value:v, unit: ref?ref.unit:'',
          ref: ref ? (ref.min+' – '+ref.max) : '—',
          out: out_of_range
        });
      });
      if(g.id==='vi'){
        const massInfo = ClinicalEngine.calcMass(study, bsaVal);
        const geo = massInfo ? ClinicalEngine.calcGeometry(study, massInfo.massIndexed, sex) : null;
        if(geo){
          out.push({ group:g.label, label:'Espesor parietal relativo (RWT)', value:geo.rwt, unit:'', ref:'≤ 0.42', out: geo.rwt>0.42 });
          if(geo.label) out.push({ group:g.label, label:'Geometría del VI', value:geo.label, unit:'', ref:'Normal', out: geo.label!=='Geometría normal' });
        }
      }
      if(g.id==='motilidad'){
        if(study.seg_alteracion==='Sí'){
          const wm = ClinicalEngine.calcWallMotion(study);
          out.push({ group:g.label, label:'Índice de motilidad segmentaria (WMSI)', value:wm.wmsi, unit:'', ref:'1.0', out: wm.wmsi>1.0 });
          wm.abnormal.forEach(s=>{
            out.push({ group:g.label, label:s.label+' ('+TERRITORY_NAMES[s.territory]+')', value:s.value, unit:'', ref:'Normal', out:true });
          });
        } else {
          out.push({ group:g.label, label:'Motilidad segmentaria', value:'Sin trastorno de motilidad segmentaria', unit:'', ref:'Normal', out:false });
        }
      }
      if(g.id==='diastolica'){
        const isAF = study.p_ritmo==='Fibrilación auricular';
        const diast = ClinicalEngine.classifyDiastolic(study);
        if(!isAF && diast && diast.ea!==null && diast.ea!==undefined){
          const eaRounded = Math.round(diast.ea*100)/100;
          out.push({ group:g.label, label:'Relación E/A', value:eaRounded, unit:'', ref:'1.0 – 2.0', out: eaRounded<0.8||eaRounded>2 });
        }
        if(isAF){
          if(diast && diast.ee!==null && diast.ee!==undefined) out.push({ group:g.label, label:"Relación E/e' septal", value:diast.ee, unit:'', ref:'≤ 11', out: diast.ee>11 });
        } else if(diast && diast.ee!==null && diast.ee!==undefined){
          const eeRounded = Math.round(diast.ee*100)/100;
          out.push({ group:g.label, label:"Relación E/e'", value:eeRounded, unit:'', ref:'< 14', out: eeRounded>14 });
        }
        if(diast){
          if(isAF){
            out.push({ group:g.label, label:'Flujo mitral', value:'Monofásico (sin onda A)', unit:'', ref:'Bifásico (E/A)', out:true });
            out.push({ group:g.label, label:'Presión de llenado del VI', value:diast.lap, unit:'', ref:'Normal', out: diast.lap==='Elevada' });
          } else {
            out.push({ group:g.label, label:'Grado de función diastólica', value:diast.grade, unit:'', ref:'Normal', out: diast.cat!=='normal' });
            out.push({ group:g.label, label:'Patrón de llenado mitral', value:diast.pattern, unit:'', ref:'Normal', out: diast.cat!=='normal' });
            out.push({ group:g.label, label:'Presión de llenado del VI', value:diast.lap, unit:'', ref:'Normal', out: diast.lap==='Elevada' });
          }
          if(study.p_ritmo && study.p_ritmo!=='Sinusal' && !isAF){
            out.push({ group:g.label, label:'Validez de la graduación', value:'No validada ('+study.p_ritmo+')', unit:'', ref:'Ritmo sinusal', out:true });
          }
        }
      }
    });
    return out;
  }

  function describe(study){
    const lines = [];
    const sex = study.p_sexo;

    /* 1. Dimensiones de cámaras: AI, VI y cavidades derechas, en una sola frase si todo es normal.
       Para la AI, las guías ASE/EACVI priorizan el volumen indexado (más preciso) sobre el
       diámetro lineal cuando ambos están disponibles; el diámetro queda solo como dato complementario. */
    const aiVoli = ClinicalEngine.num(study.ai_voli);
    const aiDiam = ClinicalEngine.num(study.ai_diam);
    const aiRef = ReferenceRanges.get('ai_diam', sex);
    let aiKnown = false, aiDilated = false;
    if(aiVoli!==null){ aiKnown = true; aiDilated = aiVoli>34; }
    else if(aiDiam!==null && aiRef){ aiKnown = true; aiDilated = aiDiam>aiRef.max; }

    const ddvi = ClinicalEngine.num(study.vi_ddvi);
    const ddviRef = ReferenceRanges.get('vi_ddvi', sex);
    const viKnown = ddvi!==null && ddviRef;
    const viDilated = viKnown && ddvi>ddviRef.max;

    const vdDiam = ClinicalEngine.num(study.vd_diam);
    const vdRef = ReferenceRanges.get('vd_diam', sex);
    const vdKnown = vdDiam!==null && vdRef;
    const vdDilated = vdKnown && vdDiam>vdRef.max;

    const chamberItems = [];
    if(aiKnown) chamberItems.push({ name:'aurícula izquierda', dilated:aiDilated });
    if(viKnown) chamberItems.push({ name:'ventrículo izquierdo', dilated:viDilated });
    if(vdKnown) chamberItems.push({ name:'cavidades derechas', dilated:vdDilated });

    if(chamberItems.length){
      const anyDilated = chamberItems.some(c=>c.dilated);
      if(!anyDilated){
        const names = chamberItems.map(c=>c.name);
        const joined = names.length>1 ? names.slice(0,-1).join(', ')+' y '+names[names.length-1] : names[0];
        const cap = joined.charAt(0).toUpperCase()+joined.slice(1);
        lines.push(cap+' de diámetros y volúmenes conservados.');
      } else {
        chamberItems.forEach(c=>{
          const cap = c.name.charAt(0).toUpperCase()+c.name.slice(1);
          lines.push(cap+(c.dilated?' dilatada/o.':' de diámetros y volúmenes conservados.'));
        });
      }
    }

    /* 2. Aorta */
    const aoRaiz = ClinicalEngine.num(study.ao_raiz);
    const aoRaizRef = ReferenceRanges.get('ao_raiz', sex);
    if(aoRaiz!==null && aoRaizRef){
      lines.push('Aorta sinusal '+(aoRaiz>aoRaizRef.max?'dilatada':'de diámetros conservados')+'.');
    }

    /* 3-4. Masa indexada y espesor parietal relativo */
    const bsaVal = ClinicalEngine.bsa(parseFloat(study.p_peso), parseFloat(study.p_talla));
    const massInfo = ClinicalEngine.calcMass(study, bsaVal);
    const geo = massInfo ? ClinicalEngine.calcGeometry(study, massInfo.massIndexed, sex) : null;
    if(massInfo && massInfo.massIndexed!==null){
      const massCut = sex==='Femenino' ? 95 : 115;
      lines.push('Índice de masa del VI '+(massInfo.massIndexed>massCut?'aumentado':'normal')+' ('+massInfo.massIndexed+' g/m²).');
    }
    if(geo){
      lines.push('Espesor parietal relativo '+(geo.rwt>0.42?'aumentado':'normal')+' ('+geo.rwt+').');
      if(geo.label && geo.label!=='Geometría normal') lines.push(geo.label+' del ventrículo izquierdo.');
    }

    /* 5. Función sistólica global y segmentaria del VI */
    const feviClass = ClinicalEngine.classifyFEVI(study.vi_fevi, sex);
    if(feviClass){
      let segNote = '';
      if(study.seg_alteracion==='Sí'){
        const wm = ClinicalEngine.calcWallMotion(study);
        if(wm.abnormal.length) segNote = ' y segmentaria alterada (WMSI '+wm.wmsi+(wm.suggestedTerritory?(', sugestiva de compromiso de la '+TERRITORY_NAMES[wm.suggestedTerritory]):'')+')';
        else segNote = ' y segmentaria conservada';
      } else segNote = ' y segmentaria conservada';
      lines.push('Función sistólica global '+(feviClass.cat==='normal'?'conservada':feviClass.label.toLowerCase())+segNote+
        ' del ventrículo izquierdo (fracción de eyección estimada '+study.vi_fevi+'%'+(study.vi_gls?(', GLS '+study.vi_gls+'%'):'')+').');
    }

    /* 6. Función diastólica / ritmo */
    const isAF = study.p_ritmo === 'Fibrilación auricular';
    const nonSinus = study.p_ritmo && study.p_ritmo!=='Sinusal' && !isAF;
    const diast = ClinicalEngine.classifyDiastolic(study);
    if(isAF && diast){
      lines.push('Ritmo en fibrilación auricular, flujo mitral monofásico sin onda A identificable; presión de llenado del ventrículo izquierdo (por onda E, DT e IVRT) '+diast.lap.toLowerCase()+'.');
    } else if(nonSinus && diast){
      lines.push('Estudio realizado en '+study.p_ritmo.toLowerCase()+'; la graduación de la función diastólica basada en E/A y E/e\' no está validada en este ritmo.');
    } else if(diast){
      lines.push('Función diastólica '+(diast.cat==='normal'?'normal':('alterada, patrón '+diast.pattern.toLowerCase()+', disfunción diastólica '+diast.grade+', con presión de llenado del ventrículo izquierdo '+diast.lap.toLowerCase()))+'.');
    }

    /* 7. Función sistólica del VD */
    const tapse = ClinicalEngine.num(study.vd_tapse);
    if(tapse!==null) lines.push('Función sistólica del ventrículo derecho '+(tapse<17?'deprimida':'conservada')+' (TAPSE '+tapse+' mm).');

    /* 8. Presión pulmonar */
    const psap = ClinicalEngine.num(study.pul_psap);
    if(psap!==null) lines.push('PSAP estimada en '+psap+' mmHg'+(psap>35?', compatible con hipertensión pulmonar.':', dentro de límites normales.'));

    /* 9. Válvulas, en una sola frase */
    const valveClauses = [];
    const aoClass = ClinicalEngine.classifyAortic(study);
    if(study.vao_morf==='Prótesis'){
      valveClauses.push('prótesis valvular en posición aórtica'+(study.vao_insuf?(' con insuficiencia de grado '+study.vao_insuf.toLowerCase()):' normofuncionante'));
    } else if(study.vao_morf || aoClass){
      let s = 'válvula aórtica '+(study.vao_morf?study.vao_morf.toLowerCase():'');
      if(aoClass) s += aoClass.cat==='normal' ? ' sin estenosis significativa' : ' con '+aoClass.label.toLowerCase();
      s += study.vao_insuf ? (', insuficiencia '+study.vao_insuf.toLowerCase()) : ', sin insuficiencia significativa';
      valveClauses.push(s);
    }
    const tsviGrad = ClinicalEngine.num(study.tsvi_gradm);
    if(tsviGrad!==null && tsviGrad>=30) valveClauses.push('gradiente del TSVI elevado ('+tsviGrad+' mmHg), sugestivo de obstrucción dinámica');
    if(study.vmi_morf==='Calcificación'){
      valveClauses.push('esclerocalcificación del aparato mitral'+(study.vmi_insuf?(' con insuficiencia '+study.vmi_insuf.toLowerCase()):''));
    } else if(study.vmi_morf || study.vmi_insuf){
      let s = 'válvula mitral '+(study.vmi_morf&&study.vmi_morf!=='Normal'?study.vmi_morf.toLowerCase():'de apertura adecuada');
      s += study.vmi_insuf ? (', insuficiencia '+study.vmi_insuf.toLowerCase()) : ', sin regurgitación significativa';
      valveClauses.push(s);
    }
    if(study.vtr_insuf) valveClauses.push('insuficiencia tricuspídea '+study.vtr_insuf.toLowerCase());
    if(study.vpu_insuf) valveClauses.push('insuficiencia pulmonar '+study.vpu_insuf.toLowerCase());
    if(!study.vtr_insuf && !study.vpu_insuf) valveClauses.push('válvulas tricúspide y pulmonar de características normales');
    if(valveClauses.length){
      const joined = valveClauses.join(', ');
      lines.push(joined.charAt(0).toUpperCase()+joined.slice(1)+'.');
    }

    /* 10. Pericardio */
    lines.push((study.hallazgos||[]).includes('Derrame pericárdico') ? 'Se observa derrame pericárdico.' : 'No se halló derrame pericárdico.');

    /* 11. Hallazgos adicionales y texto libre */
    const otherFindings = (study.hallazgos||[]).filter(h=>h!=='Derrame pericárdico');
    if(otherFindings.length) lines.push('Se identifican además: '+otherFindings.join(', ')+'.');
    if(study.hallazgosLibres) lines.push(study.hallazgosLibres);

    if(lines.length===0) return 'No se observa derrame pericárdico ni otras alteraciones estructurales significativas con la información disponible.';
    return lines.join('\n');
  }

  function conclude(study){
    const lines = [];
    let anyPath = false;
    const feviClass = ClinicalEngine.classifyFEVI(study.vi_fevi, study.p_sexo);
    if(feviClass){
      if(feviClass.cat==='normal') lines.push('Función sistólica del ventrículo izquierdo conservada.');
      else { lines.push('Función sistólica del ventrículo izquierdo '+feviClass.label.toLowerCase()+' (FEVI '+study.vi_fevi+'%).'); anyPath=true; }
    }
    if(study.seg_alteracion==='Sí'){
      const wm = ClinicalEngine.calcWallMotion(study);
      if(wm.abnormal.length){
        let territoryNote = wm.suggestedTerritory ? (', sugestivo de compromiso de la '+TERRITORY_NAMES[wm.suggestedTerritory]) : '';
        lines.push('Trastorno de motilidad segmentaria (WMSI '+wm.wmsi+')'+territoryNote+'.');
        anyPath=true;
      }
    }
    const aoClass = ClinicalEngine.classifyAortic(study);
    if(aoClass && aoClass.cat!=='normal'){ lines.push(aoClass.label+'.'); anyPath=true; }
    if(study.vmi_insuf){ lines.push('Insuficiencia mitral '+study.vmi_insuf.toLowerCase()+'.'); anyPath=true; }
    const diast = ClinicalEngine.classifyDiastolic(study);
    const isAFConcl = study.p_ritmo === 'Fibrilación auricular';
    const nonSinusConcl = study.p_ritmo && study.p_ritmo!=='Sinusal' && !isAFConcl;
    if(isAFConcl && diast){
      lines.push('Fibrilación auricular con flujo mitral monofásico; presión de llenado del ventrículo izquierdo '+diast.lap.toLowerCase()+'.');
      anyPath=true;
    } else if(nonSinusConcl && diast){
      lines.push('Función diastólica no graduable de forma estándar por ritmo no sinusal ('+study.p_ritmo.toLowerCase()+').');
      anyPath=true;
    } else if(diast && diast.cat!=='normal'){
      lines.push(diast.label+' (presión de llenado '+diast.lap.toLowerCase()+').');
      anyPath=true;
    }
    if(study.vtr_insuf){ lines.push('Insuficiencia tricuspídea '+study.vtr_insuf.toLowerCase()+'.'); anyPath=true; }
    const psap = ClinicalEngine.num(study.pul_psap);
    if(psap!==null && psap>35){ lines.push('Datos compatibles con hipertensión pulmonar (PSAP '+psap+' mmHg).'); anyPath=true; }
    (study.hallazgos||[]).forEach(h=>{ lines.push(h+'.'); anyPath=true; });
    if(!anyPath) return 'Ecocardiograma Doppler Color dentro de límites normales.\nFunción sistólica biventricular conservada.\nSin valvulopatías significativas.';
    if(!study.vmi_insuf && (!aoClass||aoClass.cat==='normal')) lines.push('Sin otras valvulopatías significativas.');
    return lines.join('\n');
  }

  return { rows, describe, conclude };
})();

/* ---------------- VoiceEngine ---------------- */
const VoiceEngine = (()=>{
  let recognition=null, listening=false;
  const NUM_WORDS = {cero:0,uno:1,una:1,dos:2,tres:3,cuatro:4,cinco:5,seis:6,siete:7,ocho:8,nueve:9,diez:10,
    once:11,doce:12,trece:13,catorce:14,quince:15,dieciseis:16,diecisiete:17,dieciocho:18,diecinueve:19,veinte:20,
    veintiuno:21,veintidos:22,veintitres:23,veinticuatro:24,veinticinco:25,veintiseis:26,veintisiete:27,veintiocho:28,veintinueve:29,
    treinta:30,cuarenta:40,cincuenta:50,sesenta:60,setenta:70,ochenta:80,noventa:90};

  function normalizeAccents(s){ return s.normalize('NFD').replace(/[\u0300-\u036f]/g,''); }
  function wordsToNumber(text){
    text=normalizeAccents(text.toLowerCase().trim()).replace(/[:\-]/g,' ').replace(/\s+/g,' ');
    if(/^[0-9]+([.,][0-9]+)?$/.test(text)) return text.replace(',','.');
    const pm = text.match(/^(.+?)\s+punto\s+(.+)$/);
    if(pm){
      const ip = wordsToNumber(pm[1]);
      /* parte decimal dictada dígito por dígito (ej. "tres nueve" -> ".39") */
      const decWords = pm[2].trim().split(/\s+/);
      let decStr='', allDigits=true;
      decWords.forEach(w=>{ if(NUM_WORDS[w]!==undefined && NUM_WORDS[w]<=9) decStr+=String(NUM_WORDS[w]); else allDigits=false; });
      if(allDigits && decStr && ip!==null) return ip+'.'+decStr;
      const dp = wordsToNumber(pm[2]);
      if(ip!==null && dp!==null) return ip+'.'+dp;
    }
    /* cien/ciento (ej. "ciento diez" -> 110); cubre el rango típico de volúmenes ventriculares */
    const HUNDREDS = {cien:100, ciento:100, doscientos:200, doscientas:200, trescientos:300, trescientas:300,
      cuatrocientos:400, cuatrocientas:400, quinientos:500, quinientas:500, seiscientos:600, seiscientas:600,
      setecientos:700, setecientas:700, ochocientos:800, ochocientas:800, novecientos:900, novecientas:900};
    const hm = text.match(/^(\S+)\s*(.*)$/);
    if(hm && HUNDREDS[hm[1]]!==undefined){
      const base = HUNDREDS[hm[1]];
      const rest = hm[2].trim();
      if(!rest) return String(base);
      const restVal = wordsToNumber(rest);
      if(restVal!==null) return String(base+parseFloat(restVal));
    }
    const rawParts = text.split(/\s+y\s+/);
    if(rawParts.length===1){
      const words = text.split(/\s+/);
      if(words.length===2 && NUM_WORDS[words[0]]!==undefined && NUM_WORDS[words[0]]%10===0 && NUM_WORDS[words[0]]>=20 && NUM_WORDS[words[1]]!==undefined && NUM_WORDS[words[1]]<10){
        return String(NUM_WORDS[words[0]]+NUM_WORDS[words[1]]);
      }
    }
    let total=0, matched=true;
    if(rawParts.length===0) matched=false;
    rawParts.forEach(p=>{
      p = p.trim();
      if(p==='') { return; }
      if(NUM_WORDS[p]!==undefined){ total+=NUM_WORDS[p]; }
      else {
        /* permite compuestos sin "y" dentro de cada parte, ej. "treinta cinco" */
        const ws = p.split(/\s+/);
        if(ws.length===2 && NUM_WORDS[ws[0]]!==undefined && NUM_WORDS[ws[0]]%10===0 && NUM_WORDS[ws[0]]>=20 && NUM_WORDS[ws[1]]!==undefined && NUM_WORDS[ws[1]]<10){
          total += NUM_WORDS[ws[0]]+NUM_WORDS[ws[1]];
        } else {
          matched=false;
        }
      }
    });
    return matched?String(total):null;
  }

  /* Sinónimos/variantes habladas para cada campo. No es necesario decir el nombre
     exacto como aparece en la app: cualquiera de estas frases sirve. */
  /* Aliases basados en la voz REAL del médico (dictado natural en orden de lectura de la app).
     Cada campo tiene sus variantes exactas tal como las pronuncia. */
  const VOICE_ALIASES = {
    // Datos del paciente
    p_medsol: ['grupo solicitante','médico solicitante','solicitante','médico que solicita'],
    p_motivo: ['motivo del estudio','motivo'],
    p_peso: ['peso','tesesso','talla y peso','peso del paciente'],
    p_talla: ['talla','altura del paciente'],
    p_fc: ['frecuencia card[ií]aca','frecuencia','pulso'],
    p_vci: ['vena cava inferior'],
    // Aorta
    ao_anillo: ['anillo a[oó]rtico','anillo'],
    ao_raiz: ['ra[ií]z a[oó]rtica','raíz aórtica','raiz aortica','aorta sinusal','seno de valsalva'],
    ao_ust: ['uni[oó]n sino tubular','uni[oó]n sinotubular','sino tubular'],
    ao_asc: ['aorta ascendente'],
    // Aurícula izquierda — exactamente como las dice: "auricular izquierda diámetro" etc.
    ai_diam: ['auricular izquierda di[aá]metro','aur[ií]cula izquierda di[aá]metro','di[aá]metro auricular izquierdo','di[aá]metro de ai','ai di[aá]metro','\bai\b(?!\s*(?:volumen|indexad))'],
    ai_vol: ['auricular izquierda volumen(?!\s*indexad)','aur[ií]cula izquierda volumen(?!\s*indexad)','volumen auricular izquierdo(?!\s*indexad)','volumen de ai(?!\s*indexad)'],
    ai_voli: ['auricular izquierda volumen indexado','aur[ií]cula izquierda volumen indexado','volumen indexado de aur[ií]cula izquierda','volumen indexado de ai','ai indexada','ai indexado','volumen auricular indexado'],
    // Ventrículo izquierdo — como las dice: "diámetro diabólico LVI", "diámetro sistólico del VI"
    vi_siv: ['septum interventricular','septum','tabique interventricular','espesor septal','espesor del septum'],
    vi_pp: ['pared posterior','espesor de pared posterior','espesor parietal'],
    vi_ddvi: ['di[aá]metro diab[oó]lico lvi','di[aá]metro diast[oó]lico lvi','di[aá]metro diast[oó]lico del vi','ddvi','di[aá]metro diast[oó]lico final','di[aá]metro de fin de di[aá]stole','vi en di[aá]stole','di[aá]metro diastólico'],
    vi_dsvi: ['di[aá]metro sist[oó]lico del vi','di[aá]metro sist[oó]lico lvi','dsvi','di[aá]metro sist[oó]lico final','vi en s[ií]stole','di[aá]metro sist[oó]lico'],
    vi_vtd: ['volumen telediast[oó]lico por simpson','volumen telediastólico','volumen de fin de di[aá]stole','vtd'],
    vi_vts: ['volumen telesist[oó]lico por simpson','volumen telesistólico','volumen de fin de s[ií]stole','vts'],
    // FEVI — como la pronuncia: "FEI", "Faye por Simpson", "Faye por Texas ball"
    vi_fevi: ['faye por simpson','faye por texas ball','faye por teichholz','fei','fay','fevi','fracci[oó]n de eyecci[oó]n','fraccion de eyeccion','fey'],
    vi_gls: ['gls','strain longitudinal global','strain global','deformaci[oó]n longitudinal'],
    vi_masai: ['masa indexada','[ií]ndice de masa','masa indexada del vi'],
    // TSVI — como la dice: "diámetro TCBI", "velocidad máxima TCBI", "gradiente TCBI"
